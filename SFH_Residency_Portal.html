<!DOCTYPE html>
<html lang="en">

<title>DSFH Internal Medicine Residency Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',system-ui,sans-serif;}
body{background:#f5ede0;color:#1c1410;min-height:100vh;}
/* ── App layout ── */
.app-layout{display:flex;min-height:100vh;}
.sidebar{width:250px;background:#ede5d8;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid #d8cdc0;}
.sidebar-brand{padding:22px 18px 16px;border-bottom:1px solid rgba(61,32,16,.1);}
.sidebar-brand h1{font-size:.95rem;font-weight:800;color:#3d2010;letter-spacing:-.01em;line-height:1.4;}
.sidebar-brand p{font-size:.7rem;color:rgba(61,32,16,.45);margin-top:2px;}
.sidebar-user{padding:12px 14px;border-bottom:1px solid rgba(61,32,16,.08);display:flex;align-items:center;gap:10px;}
.sidebar-user-info{min-width:0;}
.sidebar-user-name{font-size:.82rem;font-weight:700;color:#3d2010;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-role{font-size:.68rem;color:rgba(61,32,16,.5);margin-top:1px;text-transform:uppercase;letter-spacing:.06em;}
.sidebar-nav{flex:1;padding:8px 0;}
.snav{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:.84rem;font-weight:500;color:rgba(61,32,16,.55);cursor:pointer;border-left:3px solid transparent;transition:all .12s;margin:1px 8px;border-radius:8px;}
.snav:hover{background:rgba(201,106,74,.1);color:#c96a4a;}
.snav.active{background:rgba(201,106,74,.15);color:#c96a4a;border-left-color:#c96a4a;font-weight:700;}
.snav .sni{font-size:1rem;width:22px;text-align:center;flex-shrink:0;}
.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(61,32,16,.08);}
.sidebar-acct{background:rgba(201,106,74,.1);border:1px solid rgba(201,106,74,.25);color:#a0502a;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;width:100%;margin-bottom:6px;transition:all .12s;}
.sidebar-acct:hover{background:rgba(201,106,74,.18);color:#c96a4a;}
.sidebar-logout{background:rgba(185,32,64,.06);border:1px solid rgba(185,32,64,.18);color:#b52040;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;width:100%;transition:all .12s;}
.sidebar-logout:hover{background:rgba(185,32,64,.14);color:#8a1830;}
.main-area{flex:1;overflow-y:auto;background:#f5ede0;min-width:0;}
.nav{display:none;}
/* ── Cards & content ── */
.content{max-width:1040px;margin:0 auto;padding:28px 24px;}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(26,20,16,.05),0 1px 2px rgba(26,20,16,.04);padding:22px;margin-bottom:18px;border:1px solid #ede5d8;}
.card-title{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:1.05rem;color:#1c1410;margin-bottom:14px;}
/* ── Stat boxes ── */
.statbox{background:#faf6f1;border:1px solid #ede5d8;border-radius:12px;padding:16px;text-align:center;}
.statval{font-size:1.8rem;font-weight:800;color:#1c1410;letter-spacing:-.03em;line-height:1.1;}
.statlbl{font-size:.72rem;color:#9c8070;margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
/* ── Pills & tabs ── */
.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid #ede5d8;background:#faf6f1;color:#7a6555;transition:all .12s;}
.pill.on{background:#c96a4a;color:#fff;border-color:#c96a4a;}
.pill.cur{background:#c9913a;color:#fff;border-color:#c9913a;}
.tab{display:inline-block;padding:8px 18px;border-radius:8px 8px 0 0;font-size:.85rem;font-weight:600;cursor:pointer;color:#9c8070;border:1px solid transparent;margin-right:2px;transition:all .12s;}
.tab.on{background:#fff;color:#c96a4a;border-color:#ede5d8;border-bottom-color:#fff;}
.tab-bar{border-bottom:1px solid #ede5d8;margin-bottom:16px;}
/* ── Avatar ── */
.av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:#fff;flex-shrink:0;}
/* ── Badges ── */
.bdg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:700;}
.level-badge{padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:700;color:#fff;}
/* ── Progress ── */
.pbar-bg{background:#ede5d8;border-radius:999px;height:7px;overflow:hidden;flex:1;}
.pbar{height:100%;border-radius:999px;transition:width .4s;}
/* ── Typography ── */
.name{font-weight:700;font-size:.9rem;color:#1c1410;}
.sub{font-size:.78rem;color:#7a6555;}
.lbl{font-size:.8rem;font-weight:600;color:#4a3828;margin-bottom:4px;}
.sh{color:#9c8070;font-size:.82rem;}
.group-header{font-weight:700;font-size:.72rem;color:#9c8070;letter-spacing:.07em;padding:10px 0 4px;text-transform:uppercase;}
/* ── Buttons ── */
.sbtn{padding:8px 18px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.84rem;transition:all .12s;display:inline-flex;align-items:center;gap:6px;}
.sbtn.primary{background:#c96a4a;color:#fff;}
.sbtn.primary:hover{background:#b5593a;}
.sbtn.danger{background:#b52040;color:#fff;}
.sbtn.danger:hover{background:#9a1835;}
.sbtn.success{background:#2a7a5a;color:#fff;}
.sbtn.success:hover{background:#226648;}
.sbtn.ghost{background:#faf6f1;color:#4a3828;border:1.5px solid #ede5d8;}
.sbtn.ghost:hover{background:#f2ece2;}
.sbtn.warn{background:#c9913a;color:#fff;}
.sbtn.warn:hover{background:#b07a2e;}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#faf6f1;border:1.5px solid #ede5d8;border-radius:9px;cursor:pointer;font-weight:600;font-size:.84rem;color:#4a3828;margin-bottom:16px;}
.back-btn:hover{background:#f2ece2;}
/* ── Alerts ── */
.alert-red{background:#fdf0f2;border:1px solid #f5c0c8;color:#8a1028;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:.88rem;}
.alert-yellow{background:#fdf8ed;border:1px solid #f0d898;color:#7a4c10;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:.88rem;}
.alert-green{background:#eef7f2;border:1px solid #a8d8bc;color:#1a5a36;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:.88rem;}
/* ── Drop zone ── */
.drop-zone{border:2px dashed #ede5d8;border-radius:12px;padding:24px;text-align:center;color:#9c8070;background:#faf6f1;}
/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #ede5d8;}
table{border-collapse:collapse;width:100%;font-size:.84rem;}
th{background:#faf6f1;color:#7a6555;font-weight:700;padding:10px 12px;text-align:left;border-bottom:2px solid #ede5d8;white-space:nowrap;font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;}
td{padding:9px 12px;border-bottom:1px solid #faf6f1;vertical-align:middle;}
tr:hover td{background:#fdf9f5;}
.sticky-col{position:sticky;left:0;background:#fff;z-index:2;border-right:2px solid #ede5d8;}
tr:hover .sticky-col{background:#fdf9f5;}
.sched-tbl td,.sched-tbl th{border-right:1px solid #ede5d8;}
.sched-tbl .wk-cell{background:#faf6f1;font-weight:700;color:#1c1410;text-align:center;vertical-align:middle;border-right:2px solid #ede5d8;white-space:nowrap;}
.sched-tbl tr td{white-space:normal;}
/* ── Inputs ── */
.input-sm{padding:5px 8px;border:1.5px solid #ede5d8;border-radius:7px;font-size:.82rem;width:100%;background:#fff;}
input,select,textarea{padding:9px 12px;border:1.5px solid #ede5d8;border-radius:9px;font-size:.88rem;width:100%;outline:none;transition:border .12s;background:#fff;color:#1c1410;}
input:focus,select:focus,textarea:focus{border-color:#c96a4a;box-shadow:0 0 0 3px rgba(201,106,74,.12);}
label{display:block;font-size:.8rem;font-weight:600;color:#4a3828;margin-bottom:4px;}
/* ── Layout helpers ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.flex{display:flex;align-items:center;}
.flex-gap{display:flex;align-items:center;gap:8px;}
.flex-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}
.sep{height:1px;background:#ede5d8;margin:14px 0;}
.rot-badge{display:inline-block;padding:3px 9px;border-radius:7px;font-size:.74rem;font-weight:700;white-space:nowrap;}
/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e0d4c4 0%,#ede5d8 55%,#d8cbb8 100%);}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.22);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:700;color:#1c1410;margin-top:10px;letter-spacing:-.02em;}
.login-logo p{font-size:.82rem;color:#9c8070;margin-top:4px;}
.err{color:#b52040;font-size:.82rem;margin-top:6px;}
/* ── Resident card ── */
.res-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;border:1.5px solid #ede5d8;cursor:pointer;transition:all .12s;margin-bottom:6px;background:#fff;}
.res-card:hover,.res-card.on{border-color:#c96a4a;background:#fdf5f1;}
/* ── Forms & modal ── */
.inline-form{background:#faf6f1;border:1.5px solid #ede5d8;border-radius:12px;padding:18px;margin-top:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,16,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;overflow-y:auto;}
.modal-card{background:#fff;border-radius:16px;padding:28px;width:400px;max-width:100%;box-shadow:0 24px 60px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto;}
.modal-card h3{margin:0 0 4px;color:#1c1410;font-family:'Playfair Display',Georgia,serif;font-size:1.15rem;font-weight:700;}
.nav-btn2{background:rgba(201,106,74,.12);border:1px solid rgba(201,106,74,.25);color:#a0502a;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:.8rem;}
/* ── Attendance ── */
.att-p{background:#d1fae5;color:#065f46;}
.att-l{background:#fef3c7;color:#92400e;}
.att-a{background:#fee2e2;color:#991b1b;}
.att-o{background:#f3f4f6;color:#6b7280;}
.att-e{background:#ede9fe;color:#5b21b6;}
.att-btn{padding:4px 9px;border-radius:7px;border:1.5px solid #ede5d8;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .1s;}
.att-btn.sel-P{background:#2a7a5a;color:#fff;border-color:#2a7a5a;}
.att-btn.sel-L{background:#c9913a;color:#fff;border-color:#c9913a;}
.att-btn.sel-A{background:#b52040;color:#fff;border-color:#b52040;}
.att-btn.sel-O{background:#9ca3af;color:#fff;border-color:#9ca3af;}
.att-btn.sel-E{background:#7c3aed;color:#fff;border-color:#7c3aed;}
/* ── Home page: hero ── */
.home-hero{position:relative;background:linear-gradient(135deg,#e0d4c4 0%,#ede5d8 55%,#d8cbb8 100%);padding:52px 48px 56px;overflow:hidden;flex-shrink:0;}
.home-hero-shapes{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.home-shape{position:absolute;border-radius:4px;opacity:.3;}
.home-hero-inner{position:relative;display:flex;align-items:center;min-height:180px;}
.home-eyebrow{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(61,32,16,.45);font-weight:600;margin-bottom:14px;}
.home-title{font-family:'Playfair Display',Georgia,serif;font-size:clamp(2.2rem,4vw,3.4rem);font-weight:700;color:#3d2010;line-height:1.1;letter-spacing:-.02em;margin-bottom:8px;}
.home-subtitle{font-family:'Playfair Display',Georgia,serif;font-size:clamp(.9rem,1.8vw,1.2rem);font-style:italic;color:#9c6a4a;font-weight:400;}
.home-infocard{position:absolute;right:48px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.62);border:1px solid rgba(201,106,74,.18);border-radius:20px;padding:28px 32px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);width:260px;box-shadow:0 8px 32px rgba(61,32,16,.1),0 2px 8px rgba(61,32,16,.06);}
.home-infocard-tag{font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:rgba(61,32,16,.4);margin-bottom:18px;font-weight:600;}
.home-infocard-block{font-size:1.5rem;font-weight:800;color:#3d2010;margin-bottom:2px;}
.home-infocard-sub{font-size:.75rem;color:rgba(61,32,16,.45);margin-bottom:18px;}
.home-infocard-divider{height:1px;background:rgba(61,32,16,.1);margin-bottom:18px;}
.home-infocard-label{font-size:.65rem;color:rgba(61,32,16,.38);margin-bottom:5px;}
.home-infocard-name{font-weight:700;color:#3d2010;font-size:.88rem;}
.home-infocard-role{font-size:.68rem;color:rgba(61,32,16,.45);margin-top:2px;text-transform:capitalize;}
/* ── Home: module section ── */
.home-modules{padding:36px 48px 52px;background:#f5ede0;}
.home-section-tag{font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;color:#c96a4a;font-weight:700;margin-bottom:6px;}
.home-section-title{font-family:'Playfair Display',Georgia,serif;font-size:1.55rem;font-weight:700;color:#1c1410;margin-bottom:28px;letter-spacing:-.01em;}
.home-mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
/* Premium module card */
.home-modbtn{background:#fff;border:1px solid #ede5d8;border-radius:18px;padding:24px 20px 20px;display:flex;flex-direction:column;align-items:flex-start;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);text-align:left;box-shadow:0 2px 6px rgba(26,20,16,.04);}
.home-modbtn:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(26,20,16,.1);border-color:#c96a4a;}
.home-modbtn:active{transform:translateY(-2px);}
.home-mod-ico-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0;}
.home-mod-ico{font-size:1.5rem;line-height:1;}
.home-mod-lbl{font-size:.92rem;font-weight:700;color:#1c1410;line-height:1.3;letter-spacing:-.01em;margin-bottom:5px;}
.home-mod-desc{font-size:.76rem;color:#9c8070;line-height:1.45;flex:1;}
.home-mod-arrow{font-size:.78rem;color:#c96a4a;font-weight:700;margin-top:14px;letter-spacing:.02em;}
/* ── Home alerts strip ── */
.home-alerts{padding:0 48px;}
/* ── Tablet overrides ── */
@media(max-width:900px){
  .home-hero{padding:36px 28px 40px;}
  .home-modules{padding:24px 22px 32px;}
  .home-alerts{padding:0 22px;}
  .home-mod-grid{grid-template-columns:repeat(2,1fr);}
}
/* ── Tablet: narrow sidebar (icons only) ── */
@media(max-width:900px) and (min-width:601px){
  .sidebar{width:58px;}
  .snav span:not(.sni){display:none;}
  .sidebar-brand p,.sidebar-user-info{display:none;}
  .sidebar-footer .sidebar-acct{font-size:0;padding:8px;}
  .sidebar-footer .sidebar-acct::before{content:"⚙";font-size:1rem;}
  .sidebar-brand h1{font-size:0;visibility:hidden;}
  .sidebar-brand{padding:14px 8px;}
  .sidebar-user{justify-content:center;padding:10px 8px;}
  .sidebar-footer{padding:8px;}
  .sidebar-logout{font-size:0;padding:8px;}
  .sidebar-logout::before{content:"⏻";font-size:1rem;}
  .snav{justify-content:center;margin:2px 4px;padding:10px 0;}
}
/* Mobile top bar — hidden by default, shown on phones */
.mob-topbar{display:none;background:#ede5d8;border-bottom:1px solid #d8cdc0;padding:10px 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.mob-topbar-brand{font-size:.9rem;font-weight:800;color:#3d2010;}
.mob-topbar-right{display:flex;gap:8px;}
/* ── Mobile ── */
@media(max-width:600px){
  .sidebar{display:none;}
  .mob-topbar{display:flex;}
  .app-layout{flex-direction:column;}
  .main-area{width:100%;}
  .content{padding:14px 12px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .home-hero{padding:28px 18px 32px!important;}
  .home-hero-inner{flex-direction:column!important;gap:16px!important;}
  .home-infocard{display:none!important;}
  .home-title{font-size:2rem!important;}
  .home-subtitle{font-size:.92rem!important;}
  .home-modules{padding:20px 14px 28px!important;}
  .home-alerts{padding:0 14px!important;}
  .home-mod-grid{grid-template-columns:repeat(2,1fr)!important;gap:10px!important;}
  .home-modbtn{padding:16px 14px 14px!important;}
  .home-mod-ico-wrap{width:40px!important;height:40px!important;border-radius:11px!important;margin-bottom:12px!important;}
  .home-mod-desc{display:none;}
  .modal-overlay{align-items:flex-start;padding:0;overflow-y:auto;}
  .modal-card{width:100%;border-radius:0;max-height:none;height:auto;padding:18px 16px;box-shadow:none;}
  .inline-form{padding:12px;}
}
</style>
</head>

// Blocks/academic year are computed from today's date instead of hand-updated each month,
// so the app never falls out of sync with the calendar (each block = 4 fixed weeks;
// the academic year runs Oct 1 - Sep 30, matching residents.year_started convention).
function computeCurrentBlock(today){
  today=today||new Date();
  const m=today.getMonth();
  const y=m>=9?today.getFullYear():today.getFullYear()-1;
  for(let i=0;i<ROTA_PERIODS.length;i++){
    const[startStr,endStr]=ROTA_PERIODS[i].split("-");
    const[sd,sm]=startStr.split("/").map(Number);
    const[ed,em]=endStr.split("/").map(Number);
    const startYear=(i===0&&sm===9)?y:(sm>=10?y:y+1);
    const endYear=(i===ROTA_PERIODS.length-1&&em===9)?y+1:(em>=10?y:y+1);
    const start=new Date(startYear,sm-1,sd,0,0,0);
    const end=new Date(endYear,em-1,ed,23,59,59);
    if(today>=start&&today<=end)return{block:i+1,academicYear:y};
  }
  return{block:13,academicYear:y};
}

// ─── ROTA EXCEL IMPORT — parsing/classification helpers ─────────────────────
// Pure functions (no DOM, no Supabase) so they can be unit-tested directly.
// Expected sheet layout (matches the committee's distributed rota spreadsheet):
//   row 1: block numbers (1-13) starting a couple columns in
//   row 2: date ranges (not parsed — ROTA_PERIODS is the source of truth for those)
//   row 3+: PG level | resident name | 13 block cells
const ROTA_ALIAS_MAP={
  "matrnty":"Maternity Leave","maternity":"Maternity Leave","mat leave":"Maternity Leave",
  "vacation":"Annual Leave","annual leave":"Annual Leave","leave":"Annual Leave","al":"Annual Leave",
  "m.con":"Medical Consult","m.cons":"Medical Consult","mcons":"Medical Consult","med consult":"Medical Consult",
  "er":"Emergency Medicine","er main":"Emergency Medicine","em":"Emergency Medicine",
  "2w":"2wks","2wk":"2wks","2wks":"2wks"
};
function normalizeRotToken(tok){
  tok=(tok==null?"":String(tok)).trim();
  if(!tok)return "";
  const low=tok.toLowerCase();
  if(ROTA_ALIAS_MAP[low])return ROTA_ALIAS_MAP[low];
  const fullMatch=ALL_ROTATIONS.find(r=>r.toLowerCase()===low);
  if(fullMatch)return fullMatch;
  const abbrMatch=Object.entries(ROT_ABBR).find(([full,ab])=>ab.toLowerCase()===low);
  if(abbrMatch)return abbrMatch[0];
  const containsMatch=ALL_ROTATIONS.find(r=>r.toLowerCase()===low||r.toLowerCase().includes(low)||(low.length>=3&&low.includes(r.toLowerCase())));
  if(containsMatch)return containsMatch;
  return tok;
}
// Classifies one rota cell's raw text into a structured rotation/leave record.
// Returns one of:
//   {type:"empty"}
//   {type:"rotation", rotationName}
//   {type:"leave", kind:"annual"|"maternity", rotationName}
//   {type:"split", weeks:2, position:"start"|"end", rotationName}   (rest-of-block rotation)
//   {type:"unknown", rotationName}   (raw token not recognized — needs manual review)
function classifyRotaCell(raw){
  const trimmed=(raw==null?"":String(raw)).trim();
  if(!trimmed||trimmed==="-"||trimmed==="—"||trimmed==="/")return{type:"empty"};
  const direct=normalizeRotToken(trimmed);
  if(ALL_ROTATIONS.includes(direct)){
    if(direct==="Annual Leave")return{type:"leave",kind:"annual",rotationName:"Annual Leave"};
    if(direct==="Maternity Leave")return{type:"leave",kind:"maternity",rotationName:"Maternity Leave"};
    return{type:"rotation",rotationName:direct};
  }
  if(trimmed.includes("/")){
    const parts=trimmed.split("/").map(s=>s.trim()).filter(Boolean);
    if(parts.length===2){
      const norm=parts.map(normalizeRotToken);
      const idxLeave=norm.findIndex(x=>x==="2wks");
      if(idxLeave!==-1){
        const other=norm[1-idxLeave];
        // If the other token is itself a leave type (e.g. "2wks/Matrnty"), treat as split leave
        if(other==="Maternity Leave")return{type:"split",weeks:2,position:idxLeave===0?"start":"end",kind:"maternity",rotationName:"Maternity Leave"};
        if(other==="Annual Leave")return{type:"split",weeks:2,position:idxLeave===0?"start":"end",kind:"annual",rotationName:"Annual Leave"};
        return{type:"split",weeks:2,position:idxLeave===0?"start":"end",rotationName:other};
      }
      // Both tokens are distinct recognized rotations → dual-rotation block (2 weeks each)
      const r0=norm[0],r1=norm[1];
      const r0ok=ALL_ROTATIONS.includes(r0)&&r0!=="Annual Leave"&&r0!=="Maternity Leave";
      const r1ok=ALL_ROTATIONS.includes(r1)&&r1!=="Annual Leave"&&r1!=="Maternity Leave";
      if(r0ok&&r1ok)return{type:"dual_rotation",weeks:2,rotationName:r0,rotationName2:r1};
    }
  }
  return{type:"unknown",rotationName:direct||trimmed};
}
// Parses a worksheet already converted to an array-of-arrays (XLSX.utils.sheet_to_json(ws,{header:1,raw:false})).
// Returns {blockCols:[1..13 in the order the columns appeared], residents:[{rowIndex,level,name,cells:{block:rawText}}]}
function parseRotaSheet(aoa){
  if(!aoa||aoa.length<3)throw new Error("Sheet has too few rows — expected a block-number row, a date row, then resident rows.");
  const headerRow=aoa[0]||[];
  const blockCols=[];
  for(let c=0;c<headerRow.length;c++){
    const n=parseInt(headerRow[c]);
    if(!isNaN(n)&&n>=1&&n<=13)blockCols.push({col:c,block:n});
  }
  if(blockCols.length===0)throw new Error("Could not find block-number columns in row 1 (expected numbers 1-13).");
  const firstBlockCol=Math.min(...blockCols.map(b=>b.col));
  // Detect which of the leading columns hold the resident's name / PGY level by
  // scanning the header labels first (handles files with an extra serial-number
  // column before "PG"/"Name", like the committee's real export); fall back to
  // fixed positions immediately before the first block column if no label matches.
  let nameCol=-1,levelCol=-1;
  for(let c=0;c<firstBlockCol;c++){
    const h=(headerRow[c]==null?"":String(headerRow[c])).trim().toLowerCase();
    if(nameCol===-1&&h==="name")nameCol=c;
    if(levelCol===-1&&/^(pg|pgy|level)/.test(h))levelCol=c;
  }
  if(nameCol===-1)nameCol=firstBlockCol-1;
  if(levelCol===-1)levelCol=firstBlockCol-2;
  const residents=[];
  for(let r=2;r<aoa.length;r++){
    const row=aoa[r]||[];
    const name=(nameCol>=0&&row[nameCol]!=null?String(row[nameCol]):"").trim();
    if(!name)continue;
    const level=(levelCol>=0&&row[levelCol]!=null?String(row[levelCol]):"").trim();
    const cells={};
    blockCols.forEach(({col,block})=>{cells[block]=(row[col]==null?"":String(row[col])).trim();});
    residents.push({rowIndex:r+1,level,name,cells});
  }
  return{blockCols:blockCols.map(b=>b.block),residents};
}
function normalizePersonName(s){
  return (s||"").toLowerCase().replace(/^dr\.?\s*/,"").replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();
}
// Best-effort fuzzy match of an Excel resident name against the live RESIDENTS roster.
// Returns {match:resident|null, confidence:0..1}. Confidence < 0.8 (or no match) should
// be surfaced to the PD for manual selection before the import is committed.
function matchResidentByName(excelName,pool){
  const norm=normalizePersonName(excelName);
  if(!norm)return{match:null,confidence:0};
  const exact=pool.find(r=>normalizePersonName(r.name)===norm);
  if(exact)return{match:exact,confidence:1};
  const containing=pool.filter(r=>{
    const rn=normalizePersonName(r.name);
    return rn.includes(norm)||norm.includes(rn);
  });
  if(containing.length===1)return{match:containing[0],confidence:0.85};
  const tokens=norm.split(" ").filter(Boolean);
  let best=null,bestScore=0;
  pool.forEach(r=>{
    const rtokens=normalizePersonName(r.name).split(" ").filter(Boolean);
    if(!rtokens.length||!tokens.length)return;
    const overlap=tokens.filter(t=>rtokens.includes(t)).length;
    const score=overlap/Math.max(tokens.length,rtokens.length);
    if(score>bestScore){bestScore=score;best=r;}
  });
  if(best&&bestScore>=0.5)return{match:best,confidence:bestScore};
  return{match:null,confidence:0};
}

function buildLeaveData(){
  RESIDENTS.forEach(r=>{
    if(!LEAVE_DATA[r.id])LEAVE_DATA[r.id]={rota:[],manual:[],absences:[]};
    const rota=LEAVE_DATA[r.id].rota;
    const existing_periods=rota.map(x=>x.period);
    for(let p=1;p<=13;p++){
      const rot=(FULL_ROTA[r.id]||{})[String(p)]||"";
      const meta=(ROTA_LEAVE_META[r.id]||{})[String(p)];
      if((rot.includes("Annual Leave")||rot.includes("Maternity Leave"))&&!existing_periods.includes(p)){
        rota.push({period:p,label:ROTA_PERIODS[p-1],rot});
      }else if(meta&&!existing_periods.includes(p)){
        // Split-block case: 2wks Annual/Maternity Leave + the rest of the block on `rot`.
        const kindLabel=meta.kind==="maternity"?"Maternity Leave":"Annual Leave";
        rota.push({period:p,label:ROTA_PERIODS[p-1],rot:meta.weeks+"wks "+kindLabel+" ("+meta.position+") + "+rot,partial:true,weeks:meta.weeks,position:meta.position});
      }
    }
  });
}

  const{error}=await sb.from("kpi_proposals").update({status:approve?"approved":"rejected",reviewed_by:u.profileId,reviewed_at:new Date().toISOString()}).eq("id",proposalId);

  const p=KPI_PROPOSALS.find(x=>x.id===proposalId);

      if(fieldMap[p.field_key])await saveKpiScore(p.resident_id,{[fieldMap[p.field_key]]:true});

  }

  const p=KPI_PROPOSALS.find(x=>x.resident_id===resId&&x.field_key===fieldKey&&x.quarter==null&&x.status==="approved");

let LEAVE_PENDING_COUNT=0;
async function loadLeaveRecords(){
  const{data,error}=await sb.from("leave_records").select("*").order("created_at",{ascending:false});
  RESIDENTS.forEach(r=>{if(!LEAVE_DATA[r.id])LEAVE_DATA[r.id]={rota:[],manual:[],absences:[],requests:[]};});
  Object.values(LEAVE_DATA).forEach(ld=>{ld.manual=[];ld.absences=[];ld.requests=[];});
  (error?[]:(data||[])).forEach(row=>{
    if(!LEAVE_DATA[row.resident_id])LEAVE_DATA[row.resident_id]={rota:[],manual:[],absences:[],requests:[]};
    if(row.type==="manual"){
      LEAVE_DATA[row.resident_id].manual.push({id:row.id,from:row.from_date,to:row.to_date,days:row.days,comment:row.comment,approved:row.approved});
    }else if(row.type==="unapproved_absence"){
      LEAVE_DATA[row.resident_id].absences.push({id:row.id,date:row.from_date,days:row.days,comment:row.comment});
    }else if(row.type==="leave_request"||row.type==="leave_rejected"){
      LEAVE_DATA[row.resident_id].requests.push({id:row.id,from:row.from_date,to:row.to_date,days:row.days,comment:row.comment,status:row.type==="leave_request"?"pending":"rejected",createdAt:row.created_at});
    }
  });
  LEAVE_PENDING_COUNT=Object.values(LEAVE_DATA).reduce((n,ld)=>n+(ld.requests||[]).filter(r=>r.status==="pending").length,0);
  render();
}

const ANN_ICON={task:"📋",research:"🔬",qi:"📈",presentation:"🎤",deadline:"⏰",other:"📌"};
function downloadRotationICS(resId){
  const res=resById(resId);if(!res)return;
  const fullRota=FULL_ROTA[resId]||{};
  function icsDate(d){return d.toISOString().split("T")[0].replace(/-/g,"");}
  function icsEscape(s){return(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");}
  const uid=()=>Math.random().toString(36).slice(2,10);
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//DSFH//Residency Portal//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "X-WR-CALNAME:"+icsEscape(res.name)+" — DSFH IM","X-WR-TIMEZONE:Asia/Riyadh"];

  // 1 ── Rotation blocks (all-day, 4-week spans)
  ROTA_PERIODS.forEach((_,i)=>{
    const blockNum=i+1;
    const rot=fullRota[String(blockNum)];if(!rot)return;
    const start=blockStartDate(blockNum,CURRENT_ACADEMIC_YEAR);if(!start)return;
    const endExcl=new Date(start.getTime()+28*86400000);
    lines.push("BEGIN:VEVENT",
      "DTSTART;VALUE=DATE:"+icsDate(start),
      "DTEND;VALUE=DATE:"+icsDate(endExcl),
      "SUMMARY:B"+blockNum+" – "+icsEscape(ROT_ABBR[rot]||rot),
      "DESCRIPTION:"+icsEscape(res.name+" • Block "+blockNum+" • "+rot+" • DSFH IM"),
      "CATEGORIES:Rotation",
      "COLOR:green",
      "UID:dsfh-rot-"+resId+"-b"+blockNum+"@dsfh.local",
      "END:VEVENT");
  });

  // 2 ── Approved leave blocks
  const ld=LEAVE_DATA[resId]||{};
  (ld.manual||[]).filter(x=>x.approved&&x.from&&x.to).forEach(lv=>{
    const isEdu=lv.comment?.startsWith("[EDU]");
    const endD=new Date(new Date(lv.to).getTime()+86400000);
    lines.push("BEGIN:VEVENT",
      "DTSTART;VALUE=DATE:"+lv.from.replace(/-/g,""),
      "DTEND;VALUE=DATE:"+endD.toISOString().split("T")[0].replace(/-/g,""),
      "SUMMARY:"+(isEdu?"📚 Educational Leave":"🏖️ Annual Leave")+" ("+lv.days+"d)",
      "DESCRIPTION:"+icsEscape((lv.comment?.replace("[EDU] ","")||"Approved leave")+" • "+res.name),
      "CATEGORIES:Leave",
      "UID:dsfh-leave-"+resId+"-"+uid()+"@dsfh.local",
      "END:VEVENT");
  });

  // 3 ── MM Presentations & Moderator duties
  MM_SESSIONS.forEach(s=>{
    let role=null;
    if(s.presenter_resident_id===resId)role="🎤 MM Presenter";
    else if(s.moderator_resident_id===resId)role="🎙 MM Moderator";
    if(!role)return;
    const d=s.session_date;
    lines.push("BEGIN:VEVENT",
      "DTSTART;TZID=Asia/Riyadh:"+d.replace(/-/g,"")+"T070000",
      "DTEND;TZID=Asia/Riyadh:"+d.replace(/-/g,"")+"T090000",
      "SUMMARY:"+icsEscape(role+": "+s.topic),
      "DESCRIPTION:"+icsEscape("Block "+s.block_number+" • "+fmtDate(d)+" • DSFH Morning Meeting"),
      "CATEGORIES:Presentation",
      "UID:dsfh-pres-"+resId+"-"+s.id+"@dsfh.local",
      "END:VEVENT");
  });

  // 4 ── Announcements / KPI task deadlines targeting this resident
  announcementsForResident(resId).filter(a=>a.deadline_date).forEach(a=>{
    const icon=ANN_ICON[a.category]||"📌";
    lines.push("BEGIN:VEVENT",
      "DTSTART;VALUE=DATE:"+a.deadline_date.replace(/-/g,""),
      "DTEND;VALUE=DATE:"+a.deadline_date.replace(/-/g,""),
      "SUMMARY:"+icsEscape(icon+" "+a.title+" — DUE"),
      "DESCRIPTION:"+icsEscape((a.description||"")+" • DSFH IM Residency"),
      "CATEGORIES:Deadline",
      "UID:dsfh-ann-"+a.id+"@dsfh.local",
      "END:VEVENT");
  });

  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;
  a.download=res.name.replace(/\s+/g,"_")+"_AY"+CURRENT_ACADEMIC_YEAR+"_"+String(CURRENT_ACADEMIC_YEAR+1).slice(-2)+".ics";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="cls")e.className=v;
    else if(k==="st")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  kids.flat(9).forEach(c=>{
    if(c==null||c===false)return;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}

async function loadCoreData(){
  const[{data:cons,error:cerr},{data:res,error:rerr},{data:profs,error:perr},{data:privs,error:pverr},{data:kpisc,error:kpierr}]=await Promise.all([
    sb.from("consultants").select("*").eq("active",true).order("created_at"),
    sb.from("residents").select("*").eq("active",true).order("created_at"),
    sb.from("profiles").select("*"),
    sb.from("account_privileges").select("*"),
    sb.from("kpi_scores").select("*").eq("academic_year",CURRENT_ACADEMIC_YEAR)
  ]);
  if(cerr||rerr||perr||pverr){
    console.error("loadCoreData error",cerr||rerr||perr||pverr);
    return false;
  }
  if(kpierr)console.warn("kpi_scores load error (table may not exist yet)",kpierr.message);
  CONSULTANTS=(cons||[]).map(c=>({id:c.id,name:c.name,user:c.username}));
  RESIDENTS=(res||[]).map(r=>({id:r.id,name:r.name,user:r.username,level:r.level,ph:r.photo_initials||initialsFromName(r.name),yearStarted:r.year_started,chiefRole:r.chief_role||null}));
  CHIEF_RES_ID=RESIDENTS.find(r=>r.chiefRole==="chief")?.id||null;
  CO_CHIEF_RES_ID=RESIDENTS.find(r=>r.chiefRole==="cochief")?.id||null;
  MENTORS={};
  (res||[]).forEach(r=>{if(r.mentor_id)MENTORS[r.id]=r.mentor_id;});
  PROFILE_BY_RESIDENT={};PROFILE_BY_CONSULTANT={};PROFILE_BY_ID={};
  (profs||[]).forEach(p=>{
    PROFILE_BY_ID[p.id]=p;
    if(p.resident_id)PROFILE_BY_RESIDENT[p.resident_id]=p;
    if(p.consultant_id)PROFILE_BY_CONSULTANT[p.consultant_id]=p;
  });
  ACCOUNT_PRIVS={};
  (privs||[]).forEach(p=>{
    if(!ACCOUNT_PRIVS[p.profile_id])ACCOUNT_PRIVS[p.profile_id]=new Set();
    ACCOUNT_PRIVS[p.profile_id].add(p.privilege_key);
  });
  KPI_SCORES={};
  (kpisc||[]).forEach(k=>{
    KPI_SCORES[k.resident_id]={commScore:k.committee_score||0,researchDone:!!k.research_participated,qiDone:!!k.qi_participated,bonusPublished:!!k.bonus_published,bonusOral:!!k.bonus_oral,bonusPoster:!!k.bonus_poster,awardsHonors:!!k.awards_honors,volunteering:!!k.volunteering};
    COMM_SC[k.resident_id]=k.committee_score||0;
  });
  ensureResidentAuxData();
  buildLeaveData();
  MENTOR_NOTES={};
  COUNSEL_CACHE={};
  return true;
}

function calcKPI(id){
  let mmAtt=0,mmTotal=0;
  Object.values(MM_ATT).forEach(blk=>{Object.values(blk).forEach(day=>{mmTotal++;if(day[id]==='P'||day[id]==='L'||day[id]==='E')mmAtt++;});});
  if(mmTotal===0){mmAtt=0;mmTotal=1;}
  const mmPct=Math.round(mmAtt/mmTotal*100);
  let tAtt=0,tTotal=0;
  Object.values(TEACH_ATT).forEach(blk=>{Object.values(blk).forEach(day=>{tTotal++;if(day[id]==='P'||day[id]==='L'||day[id]==='E')tAtt++;});});
  if(tTotal===0){tAtt=0;tTotal=1;}
  const tPct=Math.round(tAtt/tTotal*100);
  const rotPct=Math.round(((ROT_H[id]||[]).length/MANDATORY.length)*100);
  const pubQ=QUIZZES.filter(q=>q.published&&q.sc[id]!=null);
  const qAvg=pubQ.length?Math.round(pubQ.reduce((a,q)=>a+Math.round(q.sc[id]/q.max*100),0)/pubQ.length):0;
  const pres=MM_SESSIONS.some(m=>m.presenter_resident_id===id)||MM_SESSIONS.some(m=>m.moderator_resident_id===id);
  const presCount=MM_SESSIONS.filter(m=>m.presenter_resident_id===id||m.moderator_resident_id===id).length;
  const commPct=Math.round(((COMM_SC[id]||0)/10)*100);
  const ks=KPI_SCORES[id]||{};
  const af=getApprovedFields(id);
  const qiPct=(ks.qiDone||af.has("qi"))?100:0;
  const pubPct=(ks.bonusPublished||af.has("publication"))?100:0;
  const oralPct=(ks.bonusOral||af.has("oral"))?100:0;
  const posterPct=(ks.bonusPoster||af.has("poster"))?100:0;
  const awardsPct=(ks.awardsHonors||af.has("awards"))?100:0;
  const volunteeringPct=(ks.volunteering||af.has("volunteering"))?100:0;
  const overall=Math.round(
    qAvg*KPI_W.quiz/100+mmPct*KPI_W.mm/100+tPct*KPI_W.teach/100+
    (pres?100:0)*KPI_W.pres/100+commPct*KPI_W.comm/100+
    qiPct*KPI_W.qi/100+pubPct*KPI_W.pub/100+oralPct*KPI_W.oral/100+
    posterPct*KPI_W.poster/100+awardsPct*KPI_W.awards/100+volunteeringPct*KPI_W.volunteering/100
  );
  return{mmPct,mmAtt,mmTotal,tPct,tAtt,tTotal,rotPct,qAvg,pres,presCount,commPct,
    qiPct,pubPct,oralPct,posterPct,awardsPct,volunteeringPct,overall};
}

function renderLogin(){
  async function doLogin(){
    const u=document.getElementById("lu").value.trim();
    const p=document.getElementById("lp").value.trim();
    const btn=document.getElementById("lbtn");
    const errEl=document.getElementById("lerr");
    errEl.textContent="";
    if(!u||!p){errEl.textContent="Enter a username and password";return;}
    btn.disabled=true;btn.textContent="Signing in…";
    const{data,error}=await sb.auth.signInWithPassword({email:u+"@"+AUTH_EMAIL_DOMAIN,password:p});
    if(error){
      errEl.textContent="Invalid username or password";
      btn.disabled=false;btn.textContent="Sign In";
      return;
    }
    const{data:profile,error:perr}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
    if(perr||!profile){
      errEl.textContent="No profile found for this account. Contact the PD.";
      await sb.auth.signOut();
      btn.disabled=false;btn.textContent="Sign In";
      return;
    }
    STATE.user=mapProfileToUser(profile);STATE.mod=null;
    await loadCoreData();
    loadPendingCounselCount();
    loadSchedules();
    loadRotations();
    loadLeaveRecords();
    loadAnnouncements();
    loadQuizzes().then(render);
    loadKpiQuarterly();
    loadKpiProposals();
    render();
  }
  return el("div",{cls:"login-wrap"},
    el("div",{cls:"login-card"},
      el("div",{cls:"login-logo"},
        el("div",{st:{fontSize:"2.5rem"}},"🏥"),
        el("h1",null,"DSFH Residency Portal"),
        el("p",null,"Dr. Solaiman Fakeeh Hospital · Internal Medicine")
      ),
      el("div",{st:{marginBottom:"12px"}},
        el("label",null,"Username"),
        el("input",{id:"lu",placeholder:"Enter username",onKeydown:e=>{if(e.key==="Enter")doLogin();}})
      ),
      el("div",{st:{marginBottom:"16px"}},
        el("label",null,"Password"),
        el("input",{id:"lp",type:"password",placeholder:"Enter password",onKeydown:e=>{if(e.key==="Enter")doLogin();}})
      ),
      el("p",{id:"lerr",cls:"err"}),
      el("button",{id:"lbtn",cls:"sbtn primary",st:{width:"100%"},onClick:doLogin},"Sign In")

}

function getMyDuties(){
  const u=STATE.user;
  if(!u||u.role!=="resident"||!u.rid)return[];
  const todayStr=new Date().toISOString().slice(0,10);
  const duties=[];
  MM_SESSIONS.forEach(s=>{
    if(s.session_date<todayStr)return;
    if(s.presenter_resident_id===u.rid)duties.push({role:"Presenter",session:s});
    if(s.moderator_resident_id===u.rid)duties.push({role:"Moderator",session:s});
  });
  duties.sort((a,b)=>a.session.session_date.localeCompare(b.session.session_date));
  return duties;
}

function weekInBlock(s,blk){return s.week_number-4*(blk-1)+1;}
function personLabel(residentId,label){
  if(residentId){const r=resById(residentId);if(r)return r.name;}
  return label||"—";
}
function renderScheduleTable(sessions,blk,cols){
  const byWeek={};
  sessions.forEach(s=>{
    const w=weekInBlock(s,blk);
    if(!byWeek[w])byWeek[w]=[];
    byWeek[w].push(s);
  });
  const weeks=Object.keys(byWeek).map(Number).sort((a,b)=>a-b);
  const bodyRows=[];
  weeks.forEach(w=>{
    const rows=byWeek[w].slice().sort((a,b)=>a.session_date.localeCompare(b.session_date));
    rows.forEach((s,i)=>{
      const tds=[];
      if(i===0)tds.push(el("td",{rowspan:rows.length,cls:"wk-cell"},"Week "+w));
      cols.forEach(c=>tds.push(el("td",{st:{textAlign:c.center?"center":"left"}},c.render(s))));
      const rowStyle=s.row_highlight?{background:s.row_highlight+"26",borderLeft:"4px solid "+s.row_highlight}:null;
      bodyRows.push(el("tr",{st:rowStyle},...tds));
    });
  });
  return el("div",{cls:"tbl-wrap"},
    el("table",{cls:"sched-tbl"},
      el("thead",null,el("tr",null,el("th",null,"Week"),...cols.map(c=>el("th",null,c.label)))),
      sessions.length===0?
        el("tbody",null,el("tr",null,el("td",{colspan:cols.length+1,cls:"sh",st:{textAlign:"center",padding:"14px"}},"No sessions scheduled for this block yet."))):
        el("tbody",null,...bodyRows)
    )
  );
}

// ─── Morning Meeting auto-date generator ─────────────────────────────────────
// Parse ROTA_PERIODS[idx] start date for a given academic year.
function blockStartDate(blockNum,academicYear){
  const idx=blockNum-1;
  const period=ROTA_PERIODS[idx];if(!period)return null;
  const[startStr]=period.split("-");
  const[sd,sm]=startStr.split("/").map(Number);
  const year=(sm>=9)?academicYear:academicYear+1;
  return new Date(year,sm-1,sd,0,0,0);
}
// Generate Sunday–Thursday dates for each of the 4 weeks of a block (5 days × 4 weeks = 20 sessions).
function mmDatesForBlock(blockNum,academicYear){
  const start=blockStartDate(blockNum,academicYear);if(!start)return[];
  const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dates=[];
  for(let wk=0;wk<4;wk++){
    [0,1,2,3,4].forEach(dow=>{
      const d=new Date(start.getTime()+(wk*7+dow)*86400000);
      dates.push({date:d.toISOString().split("T")[0],day:DAY_NAMES[d.getDay()],week:wk+1});
    });
  }
  return dates;
}
async function generateMMSessions(blk){
  if(!confirm("Auto-generate Sunday–Thursday session slots (20 total) for Block "+blk+"?\nOnly dates not already in the schedule will be added."))return;
  const dates=mmDatesForBlock(blk,CURRENT_ACADEMIC_YEAR);
  if(!dates.length){alert("Could not compute dates for Block "+blk);return;}
  const existingDates=new Set(MM_SESSIONS.filter(s=>s.block_number===blk).map(s=>s.session_date));
  const toInsert=dates.filter(d=>!existingDates.has(d.date));
  if(!toInsert.length){alert("All session slots for Block "+blk+" already exist.");return;}
  const rows=toInsert.map(d=>({
    academic_year:CURRENT_ACADEMIC_YEAR,block_number:blk,week_number:4*(blk-1)+d.week-1,
    session_date:d.date,day_label:d.day,topic:"",created_by:STATE.user?.profileId||null
  }));
  const{error}=await sb.from("mm_sessions").insert(rows);
  if(error){alert("Could not generate sessions: "+error.message);return;}
  await loadSchedules();
}

function renderTeachEntryForm(blk,sessions){
  const vr=visRes();
  if(!sessions.length){
    return el("div",{cls:"inline-form"},
      el("div",{cls:"alert-yellow",st:{margin:"0"}},"No sessions scheduled for this block yet.")
    );
  }
  let selSession=sessions[0]?.session_date;
  let attMap={};
  let cmtMap={};
  function loadSession(dateStr){
    vr.forEach(r=>{
      attMap[r.id]=((TEACH_ATT[blk]||{})[dateStr]||{})[r.id]||null;
      cmtMap[r.id]=((TEACH_ATT_CMT[blk]||{})[dateStr]||{})[r.id]||"";
    });
  }
  loadSession(selSession);
  function findSessionId(dateStr){const s=sessions.find(x=>x.session_date===dateStr);return s?s.id:null;}
  async function saveAtt(){
    if(!selSession){alert("Please select a session first.");return;}
    const sessionId=findSessionId(selSession);
    if(!sessionId){alert("Session not found — please refresh and try again.");return;}
    const rows=vr.filter(r=>attMap[r.id]).map(r=>({session_id:sessionId,resident_id:r.id,status:attMap[r.id],comment:cmtMap[r.id]||null,marked_by:STATE.user.profileId}));
    if(!rows.length){alert("Please mark at least one resident before saving.");return;}
    const{error}=await sb.from("teaching_attendance").upsert(rows,{onConflict:"session_id,resident_id"});
    if(error){alert("Could not save attendance:\n"+error.message);return;}
    set({teachShowEntry:false,teachEntrySession:null});
    await loadSchedules();
  }
  const wrap=el("div",{cls:"inline-form"});
  const sessSelector=el("select",{st:{marginBottom:"12px"}},
    ...sessions.map(s=>el("option",{value:s.session_date},fmtDate(s.session_date)+" — "+s.topic))
  );
  sessSelector.onchange=e=>{
    selSession=e.target.value;
    loadSession(selSession);
    vr.forEach(r=>{
      const row=wrap.querySelector("#teachrow_"+r.id);
      if(row){
        ["P","L","A","E","O"].forEach(s=>{const btn=row.querySelector(".att-btn-"+s);if(btn)btn.className="att-btn att-btn-"+s+(attMap[r.id]===s?" sel-"+s:"");});
        const cinput=row.querySelector(".att-cmt-input");
        if(cinput)cinput.value=cmtMap[r.id]||"";
      }
    });
  };
  wrap.appendChild(el("div",{cls:"lbl"},"Select Session"));
  wrap.appendChild(sessSelector);
  wrap.appendChild(el("div",{cls:"lbl",st:{marginBottom:"8px"}},"Mark Attendance (P=Present  L=Late  A=Absent  E=Excused  O=Off)"));
  const rowsEl=el("div",null);
  vr.forEach(r=>{
    const cmtInput=el("input",{cls:"att-cmt-input",type:"text",placeholder:"Comment (optional)",value:cmtMap[r.id]||"",st:{flex:"1",fontSize:".78rem",padding:"3px 8px",borderRadius:"6px",border:"1px solid #ede5d8",background:"#faf6f1",minWidth:"0"}});
    cmtInput.oninput=()=>{cmtMap[r.id]=cmtInput.value;};
    const row=el("div",{id:"teachrow_"+r.id,st:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0",borderBottom:"1px solid #ede5d8",flexWrap:"wrap"}},
      el("div",{st:{minWidth:"150px",flexShrink:"0"}},el("div",{cls:"flex-gap"},avEl(r),el("span",{cls:"name",st:{fontSize:".82rem"}},r.name))),
      el("div",{st:{display:"flex",gap:"4px",flexShrink:"0"}},
        ...["P","L","A","E","O"].map(s=>{
          const btn=el("button",{cls:"att-btn att-btn-"+s+(attMap[r.id]===s?" sel-"+s:"")},s);
          btn.onclick=()=>{
            attMap[r.id]=attMap[r.id]===s?null:s;
            ["P","L","A","E","O"].forEach(ss=>{const b=row.querySelector(".att-btn-"+ss);if(b)b.className="att-btn att-btn-"+ss+(attMap[r.id]===ss?" sel-"+ss:"");});
          };
          return btn;
        })
      ),
      cmtInput
    );
    rowsEl.appendChild(row);
  });
  wrap.appendChild(rowsEl);
  wrap.appendChild(el("div",{cls:"flex-gap",st:{marginTop:"12px"}},
    el("button",{cls:"sbtn success",onClick:saveAtt},"Save Attendance"),
    el("button",{cls:"sbtn ghost",onClick:()=>set({teachShowEntry:false,teachEntrySession:null})},"Cancel")

  return wrap;

let PROMOTION_NEEDED=false;
async function checkPromotionNeeded(){
  const m=new Date().getMonth(); // 0-based; 9=Oct,10=Nov,11=Dec
  if(m<9||m>11)return; // only Oct–Dec
  const{data,error}=await sb.from("promotion_log").select("id").eq("academic_year",CURRENT_ACADEMIC_YEAR).maybeSingle();
  if(!error&&!data){PROMOTION_NEEDED=true;render();}

function renderPromoModal(){
  const nextLvl={R1:"R2",R2:"R3",R3:"R4"};
  const lvlOrd={R4:0,R3:1,R2:2,R1:3};
  const sorted=RESIDENTS.slice().sort((a,b)=>(lvlOrd[a.level]||9)-(lvlOrd[b.level]||9)||a.name.localeCompare(b.name));
  async function confirmPromo(){
    const btn=document.getElementById("promo_confirm_btn");
    if(btn){btn.disabled=true;btn.textContent="Saving…";}
    const changes=[];
    for(const r of sorted){
      if(STATE.promoSkip[r.id])continue;
      if(r.level==="R4"){
        await sb.from("residents").update({active:false}).eq("id",r.id);
        changes.push({id:r.id,name:r.name,from:"R4",to:"archived"});
      }else if(nextLvl[r.level]){
        await sb.from("residents").update({level:nextLvl[r.level]}).eq("id",r.id);
        changes.push({id:r.id,name:r.name,from:r.level,to:nextLvl[r.level]});
      }
    }
    await sb.from("promotion_log").insert({academic_year:CURRENT_ACADEMIC_YEAR,promoted_by:STATE.user.profileId,changes:JSON.stringify(changes)});
    PROMOTION_NEEDED=false;
    await loadCoreData();
    await loadRotations();
    set({showPromoModal:false,promoSkip:{}});
  }
  return el("div",{cls:"modal-overlay",onClick:e=>{if(e.target===e.currentTarget)set({showPromoModal:false});}},
    el("div",{cls:"modal-card",st:{width:"620px",maxWidth:"100%"}},

      el("p",{cls:"sh",st:{margin:"6px 0 16px"}},"Review proposed level changes for the new academic year. Uncheck anyone to skip them. R4 graduates will be archived and removed from active view."),
      el("div",{cls:"tbl-wrap"},
        el("table",null,
          el("thead",null,
            el("tr",null,
              el("th",null,"Resident"),el("th",null,"Current"),el("th",null,"Proposed"),
              el("th",{st:{textAlign:"center"}},"Include")
            )
          ),
          el("tbody",null,
            ...sorted.map(r=>{
              const skip=!!STATE.promoSkip[r.id];
              const proposed=r.level==="R4"
                ?el("span",{cls:"bdg",st:{background:"#fee2e2",color:"#b91c1c"}},"Archive")
                :nextLvl[r.level]?el("span",{cls:"bdg",st:{background:"#dcfce7",color:"#166534"}},nextLvl[r.level])
                :el("span",{cls:"sh"},"—");
              return el("tr",{st:{opacity:skip?"0.4":"1",transition:"opacity .15s"}},
                el("td",null,el("div",{cls:"flex-gap"},avEl(r),el("span",{cls:"name",st:{fontSize:".84rem"}},r.name))),
                el("td",null,levelBadge(r.level)),

                el("td",{st:{textAlign:"center"}},
                  el("input",{type:"checkbox",...(!skip?{checked:""}:{}),
                    onChange:e=>{
                      const sk={...STATE.promoSkip};
                      if(e.target.checked)delete sk[r.id];else sk[r.id]=true;
                      set({promoSkip:sk});
                    }
                  })
                )
              );
            })
          )
        )
      ),
      el("p",{cls:"sh",st:{fontSize:".75rem",marginTop:"10px"}},"⚠️ R4 residents marked as archived will no longer appear in the portal. Use Admin Panel → Residents to add incoming R1s."),
      el("div",{cls:"flex-gap",st:{marginTop:"16px",justifyContent:"flex-end",gap:"10px"}},
        el("button",{cls:"sbtn ghost",onClick:()=>set({showPromoModal:false})},"Remind Me Later"),

      )
    )
  );
}

// ─── ATTENDANCE EXPORT ───────────────────────────────────────────────────────
function exportAttendance(type, blk){
  const isMM = type === "mm";
  const sessions = (isMM ? MM_SESSIONS : TEACH_SESSIONS)
    .filter(s => s.block_number === blk)
    .slice().sort((a,b) => a.session_date.localeCompare(b.session_date));
  const ATT = isMM ? MM_ATT : TEACH_ATT;
  const vr = visRes();
  const headers = ["Resident","Level", ...sessions.map(s => fmtDate(s.session_date)+"\n"+s.topic), "Att %"];
  const rows = vr.map(r => {
    let present = 0;
    const cols = sessions.map(s => {
      const st = ((ATT[blk]||{})[s.session_date]||{})[r.id] || "";
      if(st==="P"||st==="L"||st==="E") present++;
      return st || "—";
    });
    const pct = sessions.length ? Math.round(present/sessions.length*100)+"%" : "—";
    return [r.name, r.level, ...cols, pct];
  });
  const aoa = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"] = [{wch:24},{wch:6},...sessions.map(()=>({wch:14})),{wch:7}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Attendance");
  XLSX.writeFile(wb, (isMM?"MM":"Teaching")+"_Attendance_Block"+blk+".xlsx");
}

// Quarters follow the academic year: Q1 Oct–Dec (B1-3), Q2 Jan–Mar (B4-6),
// Q3 Apr–Jun (B7-9), Q4 Jul–Sep (B10-13).
const QUARTER_BLOCKS={1:[1,2,3],2:[4,5,6],3:[7,8,9],4:[10,11,12,13]};
const QUARTER_LABELS={1:"Q1 Oct–Dec",2:"Q2 Jan–Mar",3:"Q3 Apr–Jun",4:"Q4 Jul–Sep"};
function currentQuarter(){
  const m=new Date().getMonth()+1;
  if(m>=10)return 1;
  if(m<=3)return 2;
  if(m<=6)return 3;
  return 4;
}
// Attendance + quiz stats for a specific resident within the given block list.
function calcKPIQ(id,qBlocks){
  let mmAtt=0,mmTotal=0,tAtt=0,tTotal=0;
  qBlocks.forEach(blk=>{
    const blkAtt=MM_ATT[blk]||{};
    Object.values(blkAtt).forEach(day=>{mmTotal++;if(day[id]==="P"||day[id]==="L"||day[id]==="E")mmAtt++;});
    const tBlk=TEACH_ATT[blk]||{};
    Object.values(tBlk).forEach(day=>{tTotal++;if(day[id]==="P"||day[id]==="L"||day[id]==="E")tAtt++;});
  });
  const mmPct=mmTotal?Math.round(mmAtt/mmTotal*100):null;
  const tPct=tTotal?Math.round(tAtt/tTotal*100):null;
  const pubQ=QUIZZES.filter(q=>q.published&&q.sc[id]!=null&&qBlocks.includes(q.block));
  const qAvg=pubQ.length?Math.round(pubQ.reduce((a,q)=>a+Math.round(q.sc[id]/q.max*100),0)/pubQ.length):null;
  const presCount=MM_SESSIONS.filter(s=>s.presenter_resident_id===id&&qBlocks.includes(s.block_number)).length;
  return{mmPct,mmAtt,mmTotal,tPct,tAtt,tTotal,qAvg,quizCount:pubQ.length,presCount};
}

    const approvedProp=KPI_PROPOSALS.find(p=>p.resident_id===res.id&&p.field_key===fieldKey&&p.quarter==null&&p.status==="approved");
    const border=isApproved?"#bbf7d0":pending.length?"#fde68a":"#e2e8f0";
    const bg=isApproved?"#f0fdf4":pending.length?"#fefce8":"#f8fafc";
    return el("div",{st:{background:bg,borderRadius:"12px",padding:"14px 16px",border:"1px solid "+border}},
      el("div",{cls:"flex-gap",st:{marginBottom:"8px"}},
        el("span",{st:{fontSize:"1.3rem"}},icon),
        el("div",{st:{flex:"1"}},
          el("div",{st:{fontWeight:"700",fontSize:".88rem",color:"#111827"}},label),
          el("div",{cls:"sh"},weight+"% weight")
        ),
        isApproved?el("div",{cls:"flex-gap",st:{gap:"6px",alignItems:"center"}},
          el("span",{st:{background:"#dcfce7",color:"#166534",borderRadius:"6px",padding:"2px 8px",fontSize:".74rem",fontWeight:"700"}},"✅ Verified"),
          isPD()?el("button",{cls:"sbtn ghost",st:{fontSize:".7rem",padding:"2px 8px",color:"#dc2626",borderColor:"#fca5a5"},onClick:()=>revokeKpiApproval(res.id,fieldKey)},"↩ Undo"):null
        ):
        pending.length?el("span",{st:{background:"#fef3c7",color:"#92400e",borderRadius:"6px",padding:"2px 8px",fontSize:".74rem",fontWeight:"700"}},"⏳ Pending"):
        el("span",{st:{background:"#f1f5f9",color:"#64748b",borderRadius:"6px",padding:"2px 8px",fontSize:".74rem"}},"— Not yet")
      ),
      // Approved proposal details (visible to all)
      isApproved&&approvedProp?renderProposalDetails(approvedProp):null,
      // PD review panel for pending proposals
      isPD()&&pending.length?el("div",{st:{marginTop:"6px"}},
        ...pending.map(p=>el("div",{st:{background:"#fff",border:"1px solid #fde68a",borderRadius:"8px",padding:"8px 10px",marginBottom:"4px"}},
          el("div",{st:{fontSize:".78rem",fontWeight:"600",marginBottom:"6px"}},
            "Submitted by "+(p.proposed_by_role==="resident"?"the resident":p.proposed_by_role==="consultant"?"the mentor":p.proposed_by_role==="chief"?"Chief Resident":p.proposed_by_role)+

          ),
          renderProposalDetails(p),
          el("div",{cls:"flex-gap",st:{gap:"6px"}},
            el("button",{cls:"sbtn primary",st:{fontSize:".74rem",padding:"3px 10px"},onClick:()=>reviewProposal(p.id,true)},"✓ Approve"),

          )
        ))
      ):null,
      // Submit button (hidden if already approved or pending)
      !isApproved&&!pending.length&&(canEdit_||canSetMilestone||isMyRes)?
        el("button",{cls:"sbtn ghost",st:{fontSize:".76rem",marginTop:"6px"},onClick:()=>{
          set({kpiPropModal:{resId:res.id,fieldKey},kpiPropFields:{},kpiPropUploading:false});

function renderLeaveRequests(){
  // Collect all requests across residents
  const pending=[];const rejected=[];
  RESIDENTS.forEach(r=>{
    (LEAVE_DATA[r.id]?.requests||[]).forEach(req=>{
      if(req.status==="pending")pending.push({...req,res:r});
      else rejected.push({...req,res:r});
    });
  });
  pending.sort((a,b)=>a.createdAt?.localeCompare(b.createdAt||"")||0);
  const isEdu=c=>c?.startsWith("[EDU]");
  const cleanComment=c=>c?.replace("[EDU] ","")?.split("\n")[0]||"";

  function reqRow(req,showActions){
    const edu=isEdu(req.comment);
    const rejected=req.status==="rejected";
    const rejNote=req.comment?.split("\n").find(l=>l.startsWith("[Rejection note:"))?.replace("[Rejection note: ","").replace("]","");
    return el("div",{st:{padding:"12px",border:"1px solid "+(rejected?"#fca5a5":edu?"#ddd6fe":"#bfdbfe"),borderRadius:"10px",marginBottom:"8px",background:rejected?"#fff5f5":edu?"#faf5ff":"#eff6ff"}},
      el("div",{cls:"flex-gap",st:{flexWrap:"wrap",gap:"8px",marginBottom:"6px"}},
        el("div",{cls:"flex-gap",st:{gap:"8px",alignItems:"center",flex:"1"}},
          avEl(req.res),
          el("div",null,
            el("div",{st:{fontWeight:"700",fontSize:".88rem"}},req.res.name),
            el("div",{cls:"sub"},req.res.level+" · Mentor: "+mentorName(req.res.id))
          )
        ),
        el("span",{cls:"bdg",st:{background:edu?"#ede9fe":"#dbeafe",color:edu?"#5b21b6":"#1e40af"}},edu?"📚 Educational":"🏖️ Annual"),
        el("span",{cls:"bdg",st:{background:"#f1f5f9",color:"#475569"}},req.days+"d")
      ),
      el("div",{st:{fontSize:".82rem",color:"#374151",marginBottom:"4px"}},
        "📅 "+fmtDate(req.from)+" → "+fmtDate(req.to)
      ),
      cleanComment(req.comment)?el("div",{st:{fontSize:".82rem",color:"#6b7280",marginBottom:"4px"}},"💬 "+cleanComment(req.comment)):null,
      rejected&&rejNote?el("div",{st:{fontSize:".78rem",color:"#b91c1c",marginTop:"4px"}},"❌ Rejected: "+rejNote):null,
      showActions?el("div",{cls:"flex-gap",st:{marginTop:"8px",gap:"8px"}},
        el("button",{cls:"sbtn success",st:{fontSize:".78rem"},onClick:async()=>{
          if(!confirm("Approve this leave request for "+req.res.name+"?"))return;
          await approveLeaveRequest(req.id,req.res.id,req.from,req.to,req.days,req.comment);
        }},"✓ Approve"),
        el("button",{cls:"sbtn danger",st:{fontSize:".78rem"},onClick:async()=>{
          const note=prompt("Rejection note (optional):");
          if(note===null)return;
          await rejectLeaveRequest(req.id,req.comment,note);
        }},"✗ Reject")
      ):null
    );
  }

  return el("div",null,
    el("div",{cls:"card"},
      el("div",{cls:"flex-gap",st:{marginBottom:"12px"}},
        el("span",{cls:"card-title",st:{margin:"0"}},"Pending Leave Requests"),
        el("span",{cls:"bdg",st:{background:"#fef9c3",color:"#854d0e"}},pending.length+" pending")
      ),
      pending.length===0?el("p",{cls:"sh"},"No pending requests — all clear ✅"):
      el("div",null,...pending.map(req=>reqRow(req,true)))
    ),
    rejected.length>0?el("div",{cls:"card"},
      el("div",{cls:"card-title"},"Rejected Requests"),
      el("div",{cls:"sh",st:{marginBottom:"10px",fontSize:".78rem"}},"Residents can see these in their Leave view."),
      ...rejected.map(req=>reqRow(req,false))
    ):null
  );
}
function renderLeaveDetail(rid,onBack){
  const res=resById(rid);
  if(!res)return el("div",null,"Not found");
  const ld=LEAVE_DATA[rid]||{rota:[],manual:[],absences:[],requests:[]};
  if(!LEAVE_DATA[rid])LEAVE_DATA[rid]={rota:[],manual:[],absences:[],requests:[]};
  // Quotas
  const ANNUAL_QUOTA=28;
  const EDU_QUOTA=7;
  // Split manual leaves into annual vs educational ([EDU] prefix in comment)
  const annualLeaves=ld.manual.filter(x=>x.approved&&!x.comment?.startsWith("[EDU]"));
  const eduLeaves=ld.manual.filter(x=>x.approved&&x.comment?.startsWith("[EDU]"));
  const annualApproved=annualLeaves.reduce((a,x)=>a+(x.days||0),0);
  const eduApproved=eduLeaves.reduce((a,x)=>a+(x.days||0),0);
  const absenceDays=ld.absences.reduce((a,x)=>a+(x.days||0),0);
  // Rota days that haven't been formally approved yet
  const approvedBlocks=new Set(ld.manual.map(m=>{const mt=m.comment?.match(/Rota leave B(\d+)/);return mt?parseInt(mt[1]):null;}).filter(Boolean));
  const rotaDays=ld.rota.reduce((a,l)=>a+(approvedBlocks.has(l.period)?0:(l.partial?l.weeks*7:28)),0);
  const totalUsedAnnual=annualApproved+rotaDays;
  const annualRemaining=ANNUAL_QUOTA-totalUsedAnnual;
  const eduRemaining=EDU_QUOTA-eduApproved;
  // Helper: approve a rota leave entry
  async function approveRotaLeave(l){
    const blockStart=blockStartDate(l.period,CURRENT_ACADEMIC_YEAR);
    if(!blockStart){alert("Cannot compute dates for this block.");return;}
    const days=l.partial?l.weeks*7:28;
    let fromDate,toDate;
    if(!l.partial){
      fromDate=blockStart;
      toDate=new Date(blockStart.getTime()+27*86400000);
    }else if(l.position==="start"){
      fromDate=blockStart;
      toDate=new Date(blockStart.getTime()+(days-1)*86400000);
    }else{
      toDate=new Date(blockStart.getTime()+27*86400000);
      fromDate=new Date(toDate.getTime()-(days-1)*86400000);
    }
    const from=fromDate.toISOString().split("T")[0];
    const to=toDate.toISOString().split("T")[0];
    await addManualLeave(rid,from,to,days,"Rota leave B"+l.period);
  }
  return el("div",null,
    el("button",{cls:"back-btn",onClick:onBack},"← Back to List"),
    el("div",{cls:"card"},
      el("div",{cls:"flex-gap",st:{marginBottom:"14px"}},
        avEl(res),
        el("div",null,el("div",{cls:"name"},res.name),el("div",{cls:"sub"},res.level+" · Mentor: "+mentorName(res.id))),
        levelBadge(res.level)

          el("div",{cls:"statlbl"},"Annual Remaining"),

function renderCounselForm(rid,existing){

    el("div",{cls:"grid-2",st:{marginBottom:"10px"}},
      el("div",null,el("label",null,"Date"),el("input",{type:"date",id:"cs_date",value:existing?existing.date:(new Date().toISOString().split("T")[0])})),
      el("div",null,el("label",null,"Reason"),el("input",{id:"cs_reason",placeholder:"Reason for counseling",value:existing?existing.reason:""}))
    ),
    el("div",{st:{marginBottom:"10px"}},el("label",null,"Details"),el("textarea",{id:"cs_details",rows:"3",placeholder:"Detailed notes..."},existing?existing.details:"")),
    !existing?el("div",{st:{marginBottom:"10px"}},
      el("label",null,"Countersign Recipient"),
      opts.length===0?el("p",{cls:"sh"},"This resident and their mentor don't have a login yet — create one first (Admin Panel) so they can countersign this record."):
      el("select",{id:"cs_recipient"},
        ...opts.map(o=>el("option",{value:o.id},o.label))
      )
    ):null,
    el("p",{id:"cs_err",cls:"err"}),
    el("div",{cls:"flex-gap"},
      el("button",{cls:"sbtn success",onClick:async()=>{
        const date=document.getElementById("cs_date").value;
        const reason=document.getElementById("cs_reason").value.trim();
        const details=document.getElementById("cs_details").value.trim();
        const errEl=document.getElementById("cs_err");
        if(!date||!reason){errEl.textContent="Date and reason are required.";return;}
        if(existing){
          const{error}=await sb.from("counseling").update({date,reason,details}).eq("id",existing.id);
          if(error){errEl.textContent=error.message;return;}
        }else{
          const recipientEl=document.getElementById("cs_recipient");
          const recipient=recipientEl?recipientEl.value:null;
          if(!recipient){errEl.textContent="No available recipient to countersign this record.";return;}
          const{error}=await sb.from("counseling").insert({
            resident_id:rid,date,reason,details,
            issued_by:STATE.user.profileId,
            recipient_profile_id:recipient
          });
          if(error){errEl.textContent=error.message;return;}
        }
        set({counselShowForm:false,counselEditId:null});
        loadCounsel(rid);
      }},"Save"),
      el("button",{cls:"sbtn ghost",onClick:()=>set({counselShowForm:false,counselEditId:null})},"Cancel")
    )
  );
}

// ─── PD OVERVIEW DASHBOARD ───────────────────────────────────────────────────
function renderPDOverview(){
  const kpiColor=v=>v>=80?"#16a34a":v>=60?"#d97706":"#dc2626";
  const filterLevel=STATE.ovLevel||"all";
  const sortBy=STATE.ovSort||"name";

  // ── Lazy-load all counseling in one shot if not yet done ──────────────────
  const anyUnloaded=RESIDENTS.some(r=>COUNSEL_CACHE[r.id]===undefined);
  if(anyUnloaded){
    RESIDENTS.forEach(r=>{if(COUNSEL_CACHE[r.id]===undefined)COUNSEL_CACHE[r.id]=null;});
    sb.from("counseling").select("*").order("date",{ascending:false}).then(({data})=>{
      const fresh={};
      (data||[]).forEach(rec=>{
        if(!fresh[rec.resident_id])fresh[rec.resident_id]=[];
        fresh[rec.resident_id].push(rec);
      });
      RESIDENTS.forEach(r=>{COUNSEL_CACHE[r.id]=fresh[r.id]||[];});
      set({});
    });
  }

  // ── Build rows ────────────────────────────────────────────────────────────
  let rows=RESIDENTS.map(r=>{
    const k=calcKPI(r.id);
    const cRecs=COUNSEL_CACHE[r.id];
    const counselCount=Array.isArray(cRecs)?cRecs.length:null;
    const atRisk=k.overall<60||k.mmPct<60||k.tPct<60;
    return{...r,k,counselCount,atRisk};
  });
  if(filterLevel!=="all")rows=rows.filter(r=>r.level===filterLevel);
  const sortRows={name:(a,b)=>a.name.localeCompare(b.name),level:(a,b)=>a.level.localeCompare(b.level)||a.name.localeCompare(b.name),kpi:(a,b)=>b.k.overall-a.k.overall,mm:(a,b)=>b.k.mmPct-a.k.mmPct,teach:(a,b)=>b.k.tPct-a.k.tPct,quiz:(a,b)=>b.k.qAvg-a.k.qAvg};
  rows.sort(sortRows[sortBy]||sortRows.name);

  // ── Summary stats ─────────────────────────────────────────────────────────
  const total=rows.length;
  const avgKPI=total?Math.round(rows.reduce((s,r)=>s+r.k.overall,0)/total):0;
  const atRiskCount=rows.filter(r=>r.atRisk).length;
  const withCounsel=rows.filter(r=>r.counselCount>0).length;

  function statCard(icon,label,val,color,sub){
    return el("div",{st:{flex:"1",minWidth:"130px",background:color+"0d",border:"1px solid "+color+"33",borderRadius:"14px",padding:"16px 14px",textAlign:"center"}},
      el("div",{st:{fontSize:"1.5rem",marginBottom:"4px"}},icon),
      el("div",{st:{fontSize:"1.55rem",fontWeight:"900",color,lineHeight:"1.1"}},val),
      el("div",{st:{fontSize:".8rem",fontWeight:"700",color:"#374151",marginTop:"4px"}},label),
      sub?el("div",{cls:"sh",st:{fontSize:".72rem",marginTop:"2px"}},sub):null
    );
  }

  const summary=el("div",{st:{display:"flex",flexWrap:"wrap",gap:"12px",marginBottom:"20px"}},
    statCard("👥","Total Residents",total,"#1a6a9a"),
    statCard("📊","Average KPI",avgKPI+"%",kpiColor(avgKPI)),
    statCard("🔴","At Risk",atRiskCount,"#dc2626","KPI or attendance < 60%"),
    statCard("📋","With Counseling",withCounsel,"#7c3aad","Active records")
  );

  // ── Filters ───────────────────────────────────────────────────────────────
  const filters=el("div",{st:{display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center",padding:"14px 16px 6px"}},
    el("span",{cls:"sh",st:{fontWeight:"700",marginRight:"2px"}},"Level:"),
    ...["all","R1","R2","R3","R4"].map(l=>
      el("span",{cls:"pill"+(filterLevel===l?" on":""),onClick:()=>set({ovLevel:l})},l==="all"?"All":l)
    ),
    el("span",{st:{flex:"1"}}),
    el("span",{cls:"sh",st:{fontWeight:"700",marginRight:"2px"}},"Sort:"),
    ...[["name","Name"],["level","Level"],["kpi","KPI ↓"],["mm","MM"],["teach","Teach"],["quiz","Quiz"]].map(([k,lbl])=>
      el("span",{cls:"pill"+(sortBy===k?" on":""),onClick:()=>set({ovSort:k})},lbl)
    )
  );

  // ── Level badge colors ────────────────────────────────────────────────────
  const lvlStyle={R1:{bg:"#dbeafe",fg:"#1e40af"},R2:{bg:"#d1fae5",fg:"#065f46"},R3:{bg:"#fef3c7",fg:"#92400e"},R4:{bg:"#fce7f3",fg:"#7c3aad"}};

      onClick:()=>set({ovSort:key})

    const col=kpiColor(val);

          el("div",{cls:"av",st:{width:"32px",height:"32px",fontSize:".7rem",flexShrink:"0"}},row.ph),
          el("div",null,

async function createLoginFor(kind,record){
  // kind: "resident" | "consultant"
  const{data:sess}=await sb.auth.getSession();
  const token=sess?.session?.access_token;
  if(!token){alert("Your session expired — please sign in again.");return;}
  const{data,error}=await sb.functions.invoke(CREATE_LOGIN_FN,{
    body:{type:kind,recordId:record.id,username:record.user,displayName:record.name},
    headers:{Authorization:"Bearer "+token}
  });
  if(error){alert("Could not create login: "+(error.message||error));return;}
  if(data?.error){alert("Could not create login: "+data.error);return;}
  alert("Login created!\n\nUsername: "+data.username+"\nTemporary password: "+data.password+"\n\nWrite this down now — it will not be shown again. Give it to "+record.name+" and ask them to change it after first sign-in (My Account menu).");
  await loadCoreData();render();
}

async function handleRotaFileSelected(file){
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    ROTA_IMPORT.workbook=wb;
    ROTA_IMPORT.sheetNames=wb.SheetNames;
    ROTA_IMPORT.selectedSheet=wb.SheetNames[0];
    ROTA_IMPORT.fileName=file.name;
    render();
  }catch(e){
    alert("Could not read that file: "+(e.message||e));
  }
}
function parseSelectedRotaSheet(){
  try{
    const wb=ROTA_IMPORT.workbook;
    const ws=wb.Sheets[ROTA_IMPORT.selectedSheet];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
    const parsed=parseRotaSheet(aoa);
    ROTA_IMPORT.blockCols=parsed.blockCols;
    ROTA_IMPORT.rows=parsed.residents.map(r=>{
      const{match,confidence}=matchResidentByName(r.name,RESIDENTS);
      const cells={};
      parsed.blockCols.forEach(b=>{cells[b]=classifyRotaCell(r.cells[b]);});
      return{excelRowIndex:r.rowIndex,excelName:r.name,excelLevel:r.level,matchedResidentId:match?match.id:null,matchConfidence:confidence,skip:false,cells};
    });
    set({rotaImportStep:2});
  }catch(e){
    alert("Could not parse that sheet: "+(e.message||e));
  }
}
function rotaImportUnknownCells(){
  const list=[];
  ROTA_IMPORT.rows.forEach((row,ri)=>{
    if(row.skip)return;
    (ROTA_IMPORT.blockCols||[]).forEach(block=>{
      if((row.cells[block]||{}).type==="unknown")list.push({rowIdx:ri,block});
    });
  });
  return list;
}
function goToRotaImportStep3or4(){
  const unresolved=ROTA_IMPORT.rows.filter(r=>!r.skip&&!r.matchedResidentId);
  if(unresolved.length){alert("Please match or skip every resident row before continuing ("+unresolved.length+" unresolved).");return;}
  const unknown=rotaImportUnknownCells();
  set({rotaImportStep:unknown.length?3:4});
}
function applyUnknownCellChoice(rowIdx,block,choice){
  const row=ROTA_IMPORT.rows[rowIdx];
  if(choice==="__skip__")row.cells[block]={type:"empty"};
  else if(choice==="__literal__"){/* keep as-is — already classified "unknown" with the raw text preserved */}
  else if(choice==="Annual Leave")row.cells[block]={type:"leave",kind:"annual",rotationName:"Annual Leave"};
  else if(choice==="Maternity Leave")row.cells[block]={type:"leave",kind:"maternity",rotationName:"Maternity Leave"};
  else row.cells[block]={type:"rotation",rotationName:choice};
  render();
}
function resetRotaImport(){
  ROTA_IMPORT={workbook:null,sheetNames:[],rows:[],blockCols:[],academicYear:CURRENT_ACADEMIC_YEAR};
  set({rotaImportStep:1});
}
function rotaImportSummary(){
  const s={residents:0,rotation:0,leaveAnnual:0,leaveMaternity:0,split:0,dualRotation:0,literalUnknown:0,skippedCells:0,skippedRows:0};
  ROTA_IMPORT.rows.forEach(row=>{
    if(row.skip||!row.matchedResidentId){s.skippedRows++;return;}
    s.residents++;
    (ROTA_IMPORT.blockCols||[]).forEach(block=>{
      const c=row.cells[block]||{type:"empty"};
      if(c.type==="empty")s.skippedCells++;
      else if(c.type==="rotation")s.rotation++;
      else if(c.type==="dual_rotation")s.dualRotation++;
      else if(c.type==="leave"&&c.kind==="maternity")s.leaveMaternity++;
      else if(c.type==="leave")s.leaveAnnual++;
      else if(c.type==="split")s.split++;
      else if(c.type==="unknown")s.literalUnknown++;
    });
  });
  return s;
}
async function commitRotaImport(){
  const entries=[];
  ROTA_IMPORT.rows.forEach(row=>{
    if(row.skip||!row.matchedResidentId)return;
    (ROTA_IMPORT.blockCols||[]).forEach(block=>{
      const c=row.cells[block]||{type:"empty"};
      if(c.type==="empty")return;
      if(c.type==="dual_rotation"){
        // Store as "RotA / RotB" — 2 weeks of each rotation in the block, no leave
        entries.push({residentId:row.matchedResidentId,block,rotationName:c.rotationName+" / "+c.rotationName2,leaveWeeks:0,leavePosition:"none"});
      }else{
        entries.push({residentId:row.matchedResidentId,block,rotationName:c.rotationName,leaveWeeks:c.weeks||0,leavePosition:c.position||"none"});
      }
    });
  });
  if(!entries.length){alert("Nothing to import — no matched residents with rota cells to write.");return;}
  const ok=await saveRotaCells(entries);
  if(ok)set({rotaImportStep:5});
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(!STATE.user){app.appendChild(renderLogin());return;}
  const u=STATE.user;
  // Sidebar layout
  const layout=el("div",{cls:"app-layout"});
  layout.appendChild(renderSidebar());
  const main=el("div",{cls:"main-area"});
  main.appendChild(renderMobileTopBar()); // visible only on mobile via CSS
  let content;
  if(!STATE.mod){
    content=renderModGrid();
  } else {
    const modDef=MODS.find(m=>m.id===STATE.mod);
    if(modDef&&!modDef.roles.includes(u.role)){
      content=el("div",{cls:"content"},el("p",{cls:"alert-red"},"Access denied."));
    } else {
      switch(STATE.mod){
        case"rota":content=renderRota();break;
        case"rottrack":content=renderRotTrack();break;
        case"morning":content=renderMorning();break;
        case"teaching":content=renderTeaching();break;
        case"kpi":content=renderKPI();break;
        case"quiz":content=renderQuiz();break;
        case"leave":content=renderLeave();break;
        case"counseling":content=renderCounseling();break;
        case"mentornotes":content=renderMentorNotes();break;
        case"admin":content=renderAdmin();break;
        case"overview":content=renderPDOverview();break;
        case"kpi_exec":content=renderKPIExecutive();break;
        default:content=renderModGrid();
      }
    }
  }
  main.appendChild(content);
  layout.appendChild(main);
  app.appendChild(layout);
  if(STATE.kpiPropModal)app.appendChild(renderKpiProposalModal());
  if(STATE.showPromoModal&&isPD())app.appendChild(renderPromoModal());
  if(STATE.showBroadcast)(isPD()||STATE.user?.role==="chief")&&app.appendChild(renderBroadcastModal());
  const srch=renderSearchOverlay();if(srch)app.appendChild(srch);
  appendAccountModal(app);
}
function appendAccountModal(app){
  const modal=renderAccountModal();
  if(modal)app.appendChild(modal);
}
function renderProfileMM(res){
  const blk=STATE.mmBlock;
  const sessions=MM_SESSIONS.filter(s=>s.block_number===blk).slice().sort((a,b)=>a.session_date.localeCompare(b.session_date));
  return el("div",null,
    el("div",{cls:"card"},
      el("div",{cls:"lbl"},"Select Block"),
      el("div",{cls:"flex-wrap",st:{marginTop:"6px"}},
        ...ROTA_PERIODS.map((_,i)=>{const n=i+1;return el("span",{cls:"pill"+(blk===n?" on":""),onClick:()=>set({mmBlock:n})},"B"+n);})
      )
    ),
    el("div",{cls:"card"},
      el("div",{cls:"card-title"},"MM Attendance — "+res.name+" — Block "+blk),
      sessions.length===0?el("p",{cls:"sh"},"No sessions for this block"):
      (()=>{
        const wrap=el("div",null);
        sessions.forEach(s=>{
          const dayAtt=(MM_ATT[blk]||{})[s.session_date]||{};
          const cur=dayAtt[res.id]||"";
          const row=el("div",{st:{display:"flex",alignItems:"center",gap:"10px",padding:"8px",borderBottom:"1px solid #f1f5f9"}},
            el("div",{st:{minWidth:"80px",fontSize:".82rem",fontWeight:"600"}},fmtDate(s.session_date)),
            el("div",{st:{flex:"1",fontSize:".84rem"}},s.topic)
          );
          const sel=document.createElement("select");
          sel.className="input-sm";sel.style.maxWidth="80px";
          ["","P","L","A","O"].forEach(v=>{const opt=document.createElement("option");opt.value=v;opt.textContent=v||"—";if(cur===v)opt.selected=true;sel.appendChild(opt);});
          sel.onchange=async e=>{
            const v=e.target.value;
            if(!v)return;
            await markMMAttendance(s.id,res.id,v);
          };
          row.appendChild(sel);
          wrap.appendChild(row);
        });
        return wrap;
      })()
    )
  );
}

// Initialize
(async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session){
      const{data:profile}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
      if(profile){
        STATE.user=mapProfileToUser(profile);
        await loadCoreData();
        if(profile.role==="pd")checkPromotionNeeded();
        loadPendingCounselCount();
        loadSchedules();
        loadRotations();
        loadLeaveRecords();
        loadAnnouncements();
        loadKpiQuarterly();
        loadKpiProposals();
      }
    }
  }catch(err){
    console.error("Init error:",err);
  }
  render();
})();
