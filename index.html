function renderAdminDeadlines(){
  const editing=STATE.annEditId;
  const showForm=STATE.annShowForm||editing;
  const CATS=[["task","Task"],["research"," Research"],["qi"," QI Project"],["presentation"," Presentation"],["deadline"," Deadline"],["other"," Other"]];
  const today=new Date().toISOString().split("T")[0];

  function targetLabel(a){
    if(a.target_all)return "Everyone";
    if(a.target_level)return a.target_level+" residents";
    if(a.target_resident_id){const r=resById(a.target_resident_id);return r?r.name:"Specific resident";}
    return "—";
  }

  async function doSave(){
    const title=document.getElementById("ann_title")?.value.trim();
    const desc=document.getElementById("ann_desc")?.value.trim();
    const deadline=document.getElementById("ann_deadline")?.value||null;
    const cat=document.getElementById("ann_cat")?.value||"task";
    const targetType=document.getElementById("ann_target_type")?.value||"all";
    const targetLevel=document.getElementById("ann_target_level")?.value||null;
    const targetRes=parseInt(document.getElementById("ann_target_res")?.value)||null;
    if(!title){showToast("Title is required.","warning");return;}
    const ann={
      title,description:desc||null,deadline_date:deadline||null,category:cat,
      target_all:targetType==="all",
      target_level:targetType==="level"?targetLevel:null,
      target_resident_id:targetType==="resident"?targetRes:null

async function createLoginFor(kind,record){
  // kind: "resident" | "consultant" const{data:sess}=await sb.auth.getSession();
  const token=sess?.session?.access_token;
  if(!token){showToast("Your session expired — please sign in again.");return;}
  const{data,error}=await sb.functions.invoke(CREATE_LOGIN_FN,{
    body:{type:kind,recordId:record.id,username:record.user,displayName:record.name},
    headers:{Authorization:"Bearer "+token}
  });
  if(error){showToast("Could not create login: "+(error.message||error));return;}
  if(data?.error){showToast("Could not create login: "+data.error);return;}
  showInfoModal("Login Created — "+record.name,"Username: "+data.username+"\nTemporary password: "+data.password+"\n\nGive this to "+record.name+" and ask them to change their password after first sign-in (My Account button).");
  await loadCoreData();render();
}

async function togglePriv(profileId,key,grant){
  if(grant){
    const{error}=await sb.from("account_privileges").insert({profile_id:profileId,privilege_key:key,granted_by:STATE.user.profileId});
    if(error){showToast("Could not grant privilege: "+error.message);return;}

    if(error){showToast("Could not remove privilege: "+error.message);return;}
  }
  await loadCoreData();render();

async function handleRotaFileSelected(file){
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    ROTA_IMPORT.workbook=wb;
    ROTA_IMPORT.sheetNames=wb.SheetNames;
    ROTA_IMPORT.selectedSheet=wb.SheetNames[0];
    ROTA_IMPORT.fileName=file.name;
    render();
  }catch(e){
    showToast("Could not read that file: "+(e.message||e));
  }
}
function parseSelectedRotaSheet(){
  try{
    const wb=ROTA_IMPORT.workbook;
    const ws=wb.Sheets[ROTA_IMPORT.selectedSheet];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
    const parsed=parseRotaSheet(aoa);
    ROTA_IMPORT.blockCols=parsed.blockCols;
    ROTA_IMPORT.rows=parsed.residents.map(r=>{
      const{match,confidence}=matchResidentByName(r.name,RESIDENTS);
      const cells={};
      parsed.blockCols.forEach(b=>{cells[b]=classifyRotaCell(r.cells[b]);});
      return{excelRowIndex:r.rowIndex,excelName:r.name,excelLevel:r.level,matchedResidentId:match?match.id:null,matchConfidence:confidence,skip:false,cells};
    });
    set({rotaImportStep:2});
  }catch(e){
    showToast("Could not parse that sheet: "+(e.message||e));
  }
}
function rotaImportUnknownCells(){
  const list=[];
  ROTA_IMPORT.rows.forEach((row,ri)=>{
    if(row.skip)return;
    (ROTA_IMPORT.blockCols||[]).forEach(block=>{
      if((row.cells[block]||{}).type==="unknown")list.push({rowIdx:ri,block});
    });
  });
  return list;
}
function goToRotaImportStep3or4(){
  const unresolved=ROTA_IMPORT.rows.filter(r=>!r.skip&&!r.matchedResidentId);
  if(unresolved.length){showToast("Please match or skip every resident row before continuing ("+unresolved.length+" unresolved).","warning");return;}
  const unknown=rotaImportUnknownCells();
  set({rotaImportStep:unknown.length?3:4});
}
function applyUnknownCellChoice(rowIdx,block,choice){
  const row=ROTA_IMPORT.rows[rowIdx];
  if(choice==="__skip__")row.cells[block]={type:"empty"};
  else if(choice==="__literal__"){/* keep as-is — already classified "unknown" with the raw text preserved */}
  else if(choice==="Annual Leave")row.cells[block]={type:"leave",kind:"annual",rotationName:"Annual Leave"};
  else if(choice==="Maternity Leave")row.cells[block]={type:"leave",kind:"maternity",rotationName:"Maternity Leave"};
  else row.cells[block]={type:"rotation",rotationName:choice};
  render();
}
function resetRotaImport(){
  ROTA_IMPORT={workbook:null,sheetNames:[],rows:[],blockCols:[],academicYear:CURRENT_ACADEMIC_YEAR};
  set({rotaImportStep:1});
}
function rotaImportSummary(){
  const s={residents:0,rotation:0,leaveAnnual:0,leaveMaternity:0,split:0,dualRotation:0,literalUnknown:0,skippedCells:0,skippedRows:0};
  ROTA_IMPORT.rows.forEach(row=>{
    if(row.skip||!row.matchedResidentId){s.skippedRows++;return;}
    s.residents++;
    (ROTA_IMPORT.blockCols||[]).forEach(block=>{
      const c=row.cells[block]||{type:"empty"};
      if(c.type==="empty")s.skippedCells++;
      else if(c.type==="rotation")s.rotation++;
      else if(c.type==="dual_rotation")s.dualRotation++;
      else if(c.type==="leave"&&c.kind==="maternity")s.leaveMaternity++;
      else if(c.type==="leave")s.leaveAnnual++;
      else if(c.type==="split")s.split++;
      else if(c.type==="unknown")s.literalUnknown++;
    });
  });
  return s;
}
async function commitRotaImport(){
  const entries=[];
  ROTA_IMPORT.rows.forEach(row=>{
    if(row.skip||!row.matchedResidentId)return;
    (ROTA_IMPORT.blockCols||[]).forEach(block=>{
      const c=row.cells[block]||{type:"empty"};
      if(c.type==="empty")return;
      if(c.type==="dual_rotation"){
        // Store as "RotA / RotB" — 2 weeks of each rotation in the block, no leave
        entries.push({residentId:row.matchedResidentId,block,rotationName:c.rotationName+" / "+c.rotationName2,leaveWeeks:0,leavePosition:"none"});
      }else{
        entries.push({residentId:row.matchedResidentId,block,rotationName:c.rotationName,leaveWeeks:c.weeks||0,leavePosition:c.position||"none"});
      }
    });
  });
  if(!entries.length){showToast("Nothing to import — no matched residents with rota cells to write.","warning");return;}
  // Check for leave conflicts before committing
  const conflicts=[];
  entries.forEach(e=>{
    const blockStart=blockStartDate(e.block-1,CURRENT_ACADEMIC_YEAR);
    if(!blockStart)return;
    const blockEnd=new Date(blockStart.getTime()+27*86400000);
    const bFrom=blockStart.getFullYear()+"-"+String(blockStart.getMonth()+1).padStart(2,"0")+"-"+String(blockStart.getDate()).padStart(2,"0");
    const bTo=blockEnd.getFullYear()+"-"+String(blockEnd.getMonth()+1).padStart(2,"0")+"-"+String(blockEnd.getDate()).padStart(2,"0");
    const approved=(LEAVE_DATA[e.residentId]?.manual||[]).filter(l=>l.approved);
    if(approved.some(l=>bFrom<=l.to_date&&l.from_date<=bTo)){
      const res=resById(e.residentId);
      conflicts.push((res?.name||"ID "+e.residentId)+" — Block "+e.block);
    }
  });
  if(conflicts.length){
    showConfirm("Warning: "+conflicts.length+" assignment"+(conflicts.length>1?"s overlap":"  overlaps")+" with existing approved leave:\n\n"+conflicts.join("\n")+"\n\nCommit anyway?",async()=>{const ok=await saveRotaCells(entries);if(ok)set({rotaImportStep:5});},  "Commit Anyway","sbtn danger");
    return;
  }
  const ok=await saveRotaCells(entries);
  if(ok)set({rotaImportStep:5});
}

  ):null;

  return el("div",{cls:"stars-banner"},

  const passed=now>LP_DEADLINE;
  const myPlan=LEAVE_PLAN[u.rid]||null;
  if(STATE.lpFirstKey===undefined)STATE.lpFirstKey=myPlan?.first_leave_key||null;
  if(STATE.lpSecondKey===undefined)STATE.lpSecondKey=myPlan?.second_leave_key||null;
  if(STATE.lpFirstAltKey===undefined)STATE.lpFirstAltKey=myPlan?.first_leave_alt_key||null;
  if(STATE.lpSecondAltKey===undefined)STATE.lpSecondAltKey=myPlan?.second_leave_alt_key||null;
  const fk=STATE.lpFirstKey,sk=STATE.lpSecondKey;

function renderOncallEditModal(){
  if(!STATE.oncallEditDate)return null;
  const blk=STATE.oncallBlock||CURRENT_PERIOD;
  const date=STATE.oncallEditDate;
  const isWe=isWeekendDate(date);
  const slots=isWe?ONCALL_SLOTS:ONCALL_SLOTS.filter(s=>!s.ctu);
  const existing={};
  ONCALL_DATA.filter(e=>e.schedule_date===date).forEach(e=>{existing[e.slot_key]={resId:e.resident_id,resName:e.resident_name||"",isExtra:e.is_extra};});
  function close(){set({oncallEditDate:null});}
  async function save(){
    const entries=slots.map(s=>({
      slot_key:s.key,
      resident_name:document.getElementById("oc_name_"+s.key)?.value.trim()||null,
      resident_id:document.getElementById("oc_name_"+s.key)?.value.trim()?null:(document.getElementById("oc_"+s.key)?.value||null),
      is_extra:document.getElementById("oc_extra_"+s.key)?.checked||false
    }));
    const btn=document.getElementById("oc_save_btn");
    if(btn){btn.disabled=true;btn.textContent="Saving...";}
    await saveOncallDay(blk,date,entries);
    set({oncallEditDate:null});
  }
  const[y,m,d]=date.split("-").map(Number);
  const DAY_NM=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dayName=DAY_NM[new Date(y,m-1,d).getDay()];
  return el("div",{cls:"modal-overlay",onClick:e=>{if(e.target===e.currentTarget)close();}},
    el("div",{cls:"modal-card",st:{width:"560px",maxWidth:"100%"}},
      el("div",{cls:"modal-header"},
        el("h3",{cls:"modal-title"},(isWe?"":"")+" On-Call — "+dayName+", "+fmtDate(date)),
        el("button",{cls:"modal-close",onClick:close},"×")
      ),
      el("div",{cls:"modal-body"},
        isWe
          ?el("div",{cls:"alert-yellow",st:{marginBottom:"16px",fontSize:".83rem"}},"Weekend: ER/Bldg/Consult = 08:00–22:00. CTU Cover = 08:00–16:00 (day cover only).")

        el("div",null,"Safari will say a profile is downloading. Tap ",el("b",null,"Allow"),", then go to ",el("b",null,"Settings")," (a \"Profile Downloaded\" banner appears near the top) → tap it → ",el("b",null,"Install")," → ",el("b",null,"Install")," again → ",el("b",null,"Done"),". Your calendar is now live and updates automatically \u2014 no addresses to type.")
      ),
      el("div",{st:{borderTop:"1px solid #f1ede9",paddingTop:"14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
        el("button",{st:{fontSize:".77rem",color:"#b91c1c",background:"none",border:"1px solid #fca5a5",borderRadius:"6px",padding:"5px 12px",cursor:"pointer"},
          onClick:async function(){showConfirm("Reset your calendar link? Anyone subscribed to the current link will stop receiving updates and will need to re-subscribe.",async()=>{await generateCalToken();},"Reset Link","danger");}},"Reset link"),
        el("button",{cls:"sbtn primary",st:{fontSize:".84rem"},
          onClick:async function(e){e.target.textContent="Saving...";e.target.disabled=true;await saveCalPrefs(Object.assign({},prefs));}},"Save Preferences")
      )
    );
  }
  return el("div",{cls:"modal-overlay",onClick:function(e){if(e.target===e.currentTarget)close();}},
    el("div",{cls:"modal-card",st:{width:"500px",maxWidth:"95vw",maxHeight:"88vh",overflowY:"auto"}},
      el("div",{cls:"modal-title"},"My Live Calendar"),
      el("div",{st:{fontSize:".82rem",color:"rgba(31,26,18,.42)",lineHeight:"1.6",marginBottom:"20px"}}, "Subscribe once in any calendar app. Events update automatically whenever rotations, on-call shifts, meetings, or deadlines are assigned — no manual downloads needed." ),
      el("div",{cls:"lbl",st:{marginBottom:"8px"}},"What to include"),
      ...PREF_OPTS.map(mkChkRow),
      feedSection,
      el("button",{cls:"modal-close",onClick:close},"×")
    )
  );
}
// Initialize
(async function init(){
  STATE.loading=true;render();
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session){
      const{data:profile}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
      if(profile){
        STATE.user=mapProfileToUser(profile);
        STATE.calToken=profile.calendar_token||null;
        STATE.calPrefs=profile.calendar_prefs||{rota:true,oncall:true,mm:true,teach:false,deadlines:true};
        await loadCoreData();
        if(profile.role==="pd")checkPromotionNeeded();
        loadPendingCounselCount();
        loadSchedules();
        loadRotations();
        loadLeaveRecords();
        loadAnnouncements();
        loadKpiQuarterly();
        loadKpiProposals();
        loadOncallData();
        loadBestResident();
        loadLeavePlan();
        loadGimPrefs();
        loadGimStatus();
        loadNotifications();
        setInterval(()=>{if(STATE.user)loadNotifications();},60000);
        loadQuizzes().catch(e=>console.warn("Quiz load failed:",e));
      }
    }
  }catch(err){
    console.error("Init error:",err);
    document.body.innerHTML='<div style="padding:40px;text-align:center;font-family:system-ui"><h2 style="color:#b52040">Failed to load portal</h2><p style="color:#666">'+err.message+'</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#c96a4a;color:#fff;border:none;border-radius:999px;cursor:pointer;font-size:1rem">Retry</button></div>';
  }
  STATE.loading=false;render();
})();
</script>
</body>
