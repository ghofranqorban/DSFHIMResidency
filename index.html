<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DSFH Internal Medicine Residency Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
/* Eventevia Design System — DSFH Residency Portal */
/* Palette: #FEFBF3 cream · #F6EFE2 parchment · #1F1A12 dark · #c96a4a terracotta · #A47A28 gold · #7FB89C green */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',system-ui,sans-serif;}
body{background:#FEFBF3;color:#1F1A12;min-height:100vh;}
/* ── App layout ── */
.app-layout{display:flex;min-height:100vh;}
.sidebar{width:250px;background:#1F1A12;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-brand{padding:22px 18px 18px;border-bottom:1px solid rgba(254,251,243,.08);}
.sidebar-brand h1{font-family:'Playfair Display',Georgia,serif;font-size:.95rem;font-weight:700;color:#FEFBF3;letter-spacing:-.01em;line-height:1.4;}
.sidebar-brand p{font-size:.65rem;color:rgba(254,251,243,.35);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.sidebar-user{padding:12px 14px;border-bottom:1px solid rgba(254,251,243,.07);display:flex;align-items:center;gap:10px;}
.sidebar-user-info{min-width:0;}
.sidebar-user-name{font-size:.82rem;font-weight:600;color:#FEFBF3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-role{font-size:.65rem;color:rgba(254,251,243,.38);margin-top:1px;text-transform:uppercase;letter-spacing:.06em;}
.sidebar-nav{flex:1;padding:8px 0;}
.snav{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:.82rem;font-weight:500;color:rgba(254,251,243,.4);cursor:pointer;border-left:2px solid transparent;transition:all .15s;margin:1px 8px;border-radius:6px;}
.snav:hover{background:rgba(254,251,243,.06);color:rgba(254,251,243,.78);}
.snav.active{background:rgba(201,106,74,.18);color:#f0c4a8;border-left-color:#c96a4a;font-weight:600;}
.snav .sni{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7;}
.snav.active .sni{opacity:1;}
.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(254,251,243,.07);}
.sidebar-acct{background:rgba(254,251,243,.07);border:1px solid rgba(254,251,243,.12);color:rgba(254,251,243,.55);padding:7px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;width:100%;margin-bottom:6px;transition:all .15s;}
.sidebar-acct:hover{background:rgba(201,106,74,.2);color:#FEFBF3;border-color:rgba(201,106,74,.35);}
.sidebar-logout{background:transparent;border:1px solid rgba(254,251,243,.1);color:rgba(254,251,243,.35);padding:7px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;width:100%;transition:all .15s;}
.sidebar-logout:hover{background:rgba(185,32,64,.18);color:#fca5a5;border-color:rgba(185,32,64,.3);}
.main-area{flex:1;overflow-y:auto;background:#FEFBF3;min-width:0;}
.nav{display:none;}
/* ── Cards & content ── */
.content{max-width:1040px;margin:0 auto;padding:32px 28px;}
.card{background:transparent;border-radius:0;box-shadow:none;padding:22px 0;margin-bottom:0;border:none;border-bottom:1px solid rgba(31,26,18,.07);}
.card:last-child{border-bottom:none;}
.card-title{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:1.05rem;color:#1F1A12;margin-bottom:14px;}
/* ── Stat boxes ── */
.statbox{background:#F6EFE2;border:none;border-radius:10px;padding:16px;text-align:center;}
.statval{font-family:'Playfair Display',Georgia,serif;font-size:1.9rem;font-weight:700;color:#1F1A12;letter-spacing:-.02em;line-height:1.1;}
.statlbl{font-size:.68rem;color:rgba(31,26,18,.4);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
/* ── Pills & tabs ── */
.pill{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.76rem;font-weight:600;cursor:pointer;border:1px solid rgba(31,26,18,.12);background:transparent;color:rgba(31,26,18,.45);transition:all .14s;}
.pill.on{background:#c96a4a;color:#FEFBF3;border-color:#c96a4a;}
.pill.cur{background:#A47A28;color:#FEFBF3;border-color:#A47A28;}
.tab{display:inline-block;padding:7px 18px;border-radius:0;font-size:.82rem;font-weight:600;cursor:pointer;color:rgba(31,26,18,.38);border:none;border-bottom:2px solid transparent;margin-right:4px;transition:all .14s;background:transparent;}
.tab.on{color:#c96a4a;border-bottom-color:#c96a4a;}
.tab-bar{border-bottom:1px solid rgba(31,26,18,.1);margin-bottom:20px;}
/* ── Avatar ── */
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:#fff;flex-shrink:0;}
/* ── Badges ── */
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.71rem;font-weight:700;}
.level-badge{padding:3px 10px;border-radius:20px;font-size:.71rem;font-weight:700;color:#fff;}
/* ── Progress ── */
.pbar-bg{background:rgba(31,26,18,.1);border-radius:999px;height:5px;overflow:hidden;flex:1;}
.pbar{height:100%;border-radius:999px;transition:width .4s;}
/* ── Typography ── */
.name{font-weight:700;font-size:.9rem;color:#1F1A12;}
.sub{font-size:.78rem;color:rgba(31,26,18,.42);}
.lbl{font-size:.78rem;font-weight:600;color:rgba(31,26,18,.55);margin-bottom:4px;}
.sh{color:rgba(31,26,18,.4);font-size:.82rem;}
.group-header{font-weight:700;font-size:.65rem;color:rgba(31,26,18,.32);letter-spacing:.1em;padding:14px 0 6px;text-transform:uppercase;border-bottom:1px solid rgba(31,26,18,.07);margin-bottom:4px;}
/* ── Buttons ── */
.sbtn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.84rem;transition:all .14s;display:inline-flex;align-items:center;gap:6px;}
.sbtn.primary{background:#c96a4a;color:#FEFBF3;}
.sbtn.primary:hover{background:#b5593a;}
.sbtn.danger{background:#b52040;color:#fff;}
.sbtn.danger:hover{background:#9a1835;}
.sbtn.success{background:#2a7a5a;color:#fff;}
.sbtn.success:hover{background:#226648;}
.sbtn.ghost{background:#F6EFE2;color:#1F1A12;border:1px solid rgba(31,26,18,.12);}
.sbtn.ghost:hover{background:#ede5d4;}
.sbtn.warn{background:#A47A28;color:#FEFBF3;}
.sbtn.warn:hover{background:#8a6520;}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#F6EFE2;border:1px solid rgba(31,26,18,.1);border-radius:8px;cursor:pointer;font-weight:600;font-size:.83rem;color:#1F1A12;margin-bottom:18px;}
.back-btn:hover{background:#ede5d4;}
/* ── Alerts ── */
.alert-red{background:rgba(181,32,64,.05);border:1px solid rgba(181,32,64,.2);color:#7a1022;padding:12px 16px;border-radius:8px;margin-bottom:12px;font-size:.87rem;}
.alert-yellow{background:rgba(164,122,40,.06);border:1px solid rgba(164,122,40,.22);color:#6a4c10;padding:12px 16px;border-radius:8px;margin-bottom:12px;font-size:.87rem;}
.alert-green{background:rgba(127,184,156,.1);border:1px solid rgba(127,184,156,.32);color:#1a5a36;padding:12px 16px;border-radius:8px;margin-bottom:12px;font-size:.87rem;}
/* ── Drop zone ── */
.drop-zone{border:1.5px dashed rgba(31,26,18,.2);border-radius:10px;padding:24px;text-align:center;color:rgba(31,26,18,.38);background:#F6EFE2;}
/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border:1px solid rgba(31,26,18,.08);position:relative;border-radius:10px;background:#FEFBF3;}
table{border-collapse:collapse;width:100%;font-size:.84rem;}
th{background:#F6EFE2;color:rgba(31,26,18,.4);font-weight:700;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(31,26,18,.1);white-space:nowrap;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;position:sticky;top:0;z-index:3;}
td{padding:10px 14px;border-bottom:1px solid rgba(31,26,18,.06);vertical-align:middle;}
tr:hover td{background:rgba(201,106,74,.04);}
.sticky-col{position:sticky;left:0;background:#FEFBF3;z-index:2;border-right:1px solid rgba(31,26,18,.08);}
tr:hover .sticky-col{background:#fdf9f5;}
.lvl-hdr-cell{position:sticky;left:0;background:#F6EFE2;z-index:2;}
.sched-tbl td,.sched-tbl th{border-right:1px solid rgba(31,26,18,.07);}
.sched-tbl .wk-cell{background:#F6EFE2;font-weight:700;color:#1F1A12;text-align:center;vertical-align:middle;border-right:1px solid rgba(31,26,18,.1);white-space:nowrap;}
.sched-tbl tr td{white-space:normal;}
/* ── On-Call Schedule table ── */
.oncall-tbl{width:100%;border-collapse:collapse;}
.oncall-tbl thead tr{background:#1F1A12;}
.oncall-tbl thead th{color:rgba(254,251,243,.6);font-weight:700;padding:12px 14px;text-align:left;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;border-bottom:none;background:#1F1A12;white-space:nowrap;position:sticky;top:0;z-index:4;}
.oncall-tbl th.oc-sticky-date{position:sticky;left:0;z-index:5;background:#1F1A12;min-width:60px;width:60px;}
.oncall-tbl th.oc-sticky-day{position:sticky;left:60px;z-index:5;background:#1F1A12;border-right:1px solid rgba(254,251,243,.08);min-width:90px;width:90px;}
.oncall-tbl td.oc-sticky-date{position:sticky;left:0;z-index:2;background:inherit;border-right:1px solid rgba(31,26,18,.07);min-width:60px;width:60px;padding:10px 8px;}
.oncall-tbl td.oc-sticky-day{position:sticky;left:60px;z-index:2;background:inherit;border-right:1px solid rgba(31,26,18,.08);min-width:90px;width:90px;}
.oncall-tbl thead th.ctu-h{color:#CBA155;}
.oncall-tbl tbody tr{border-bottom:1px solid rgba(31,26,18,.06);transition:background .1s;}
.oncall-tbl tbody tr:nth-child(even){background:#FEFBF3;}
.oncall-tbl tbody tr:nth-child(odd){background:#faf8f3;}
.oncall-tbl tbody tr:hover td{background:rgba(201,106,74,.05)!important;}
.oncall-tbl tbody tr.oc-we{background:#F6EFE2!important;}
.oncall-tbl tbody tr.oc-we:hover td{background:rgba(127,184,156,.08)!important;}
.oncall-tbl tbody tr.oc-today{background:#fff9f6!important;box-shadow:inset 4px 0 0 #c96a4a;}
.oncall-tbl tbody tr.oc-today:hover td{background:#fff4ef!important;}
.oncall-tbl td{padding:10px 14px;vertical-align:middle;}
.oc-today-badge{display:inline-block;background:#c96a4a;color:#fff;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:7px;vertical-align:middle;letter-spacing:.05em;}
.oc-day-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.73rem;font-weight:700;white-space:nowrap;}
.oc-day-pill.wd{background:rgba(31,26,18,.08);color:rgba(31,26,18,.55);}
.oc-day-pill.we{background:#7FB89C;color:#fff;}
.oc-day-pill.today{background:#c96a4a;color:#fff;}
/* ── Inputs ── */
.input-sm{padding:5px 9px;border:1px solid rgba(31,26,18,.14);border-radius:6px;font-size:.82rem;width:100%;background:#FEFBF3;}
input,select,textarea{padding:9px 12px;border:1px solid rgba(31,26,18,.15);border-radius:8px;font-size:.87rem;width:100%;outline:none;transition:border .14s;background:#FEFBF3;color:#1F1A12;}
input:focus,select:focus,textarea:focus{border-color:#c96a4a;box-shadow:0 0 0 3px rgba(201,106,74,.1);}
label{display:block;font-size:.78rem;font-weight:600;color:rgba(31,26,18,.55);margin-bottom:4px;}
/* ── Layout helpers ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.flex{display:flex;align-items:center;}
.flex-gap{display:flex;align-items:center;gap:8px;}
.flex-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}
.sep{height:1px;background:rgba(31,26,18,.08);margin:16px 0;}
.rot-badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:.73rem;font-weight:700;white-space:nowrap;}
/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(148deg,#7c3820 0%,#c96a4a 38%,#e8956d 65%,#f2b48a 82%,#fde0c8 100%);}
.login-card{background:#FEFBF3;border-radius:14px;padding:40px 36px;width:380px;box-shadow:0 32px 80px rgba(31,26,18,.35);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:700;color:#1F1A12;margin-top:10px;letter-spacing:-.02em;}
.login-logo p{font-size:.82rem;color:rgba(31,26,18,.42);margin-top:4px;}
.err{color:#b52040;font-size:.82rem;margin-top:6px;}
/* ── Resident card ── */
.res-card{display:flex;align-items:center;gap:10px;padding:12px 8px;border-radius:0;border:none;border-bottom:1px solid rgba(31,26,18,.07);cursor:pointer;transition:background .14s;margin-bottom:0;background:transparent;}
.res-card:hover,.res-card.on{background:rgba(201,106,74,.05);}
/* ── Forms & modal ── */
.inline-form{background:#F6EFE2;border:1px solid rgba(31,26,18,.09);border-radius:10px;padding:18px;margin-top:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(31,26,18,.62);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;overflow-y:auto;}
.modal-card{background:#FEFBF3;border-radius:12px;padding:28px;width:400px;max-width:100%;box-shadow:0 24px 60px rgba(31,26,18,.28);max-height:90vh;overflow-y:auto;}
.modal-card h3{margin:0 0 4px;color:#1F1A12;font-family:'Playfair Display',Georgia,serif;font-size:1.15rem;font-weight:700;}
.nav-btn2{background:rgba(201,106,74,.1);border:1px solid rgba(201,106,74,.2);color:#c96a4a;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;}
/* ── Attendance ── */
.att-p{background:rgba(42,122,90,.1);color:#1a5a36;}
.att-l{background:rgba(164,122,40,.1);color:#6a4c10;}
.att-a{background:rgba(181,32,64,.08);color:#8a1022;}
.att-o{background:rgba(31,26,18,.06);color:rgba(31,26,18,.45);}
.att-e{background:rgba(124,58,237,.08);color:#5b21b6;}
.att-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(31,26,18,.12);cursor:pointer;font-size:.74rem;font-weight:700;transition:all .12s;}
.att-btn.sel-P{background:#2a7a5a;color:#fff;border-color:#2a7a5a;}
.att-btn.sel-L{background:#A47A28;color:#fff;border-color:#A47A28;}
.att-btn.sel-A{background:#b52040;color:#fff;border-color:#b52040;}
.att-btn.sel-O{background:rgba(31,26,18,.3);color:#fff;border-color:rgba(31,26,18,.3);}
.att-btn.sel-E{background:#7c3aed;color:#fff;border-color:#7c3aed;}
/* ── Home page: hero ── */
.home-hero{position:relative;background:linear-gradient(148deg,#7c3820 0%,#c96a4a 45%,#e8956d 70%,#fde0c8 100%);padding:52px 48px 56px;overflow:hidden;flex-shrink:0;}
.home-hero-shapes{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.home-shape{position:absolute;border-radius:4px;opacity:.2;}
.home-hero-inner{position:relative;display:flex;align-items:center;min-height:180px;}
.home-eyebrow{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(254,251,243,.5);font-weight:600;margin-bottom:14px;}
.home-title{font-family:'Playfair Display',Georgia,serif;font-size:clamp(2.2rem,4vw,3.4rem);font-weight:700;color:#FEFBF3;line-height:1.1;letter-spacing:-.02em;margin-bottom:8px;}
.home-subtitle{font-family:'Playfair Display',Georgia,serif;font-size:clamp(.9rem,1.8vw,1.2rem);font-style:italic;color:rgba(254,251,243,.65);font-weight:400;}
.home-infocard{position:absolute;right:48px;top:50%;transform:translateY(-50%);background:rgba(254,251,243,.1);border:1px solid rgba(254,251,243,.18);border-radius:14px;padding:24px 28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);width:250px;box-shadow:0 8px 32px rgba(31,26,18,.15);}
.home-infocard-tag{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(254,251,243,.4);margin-bottom:16px;font-weight:600;}
.home-infocard-block{font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:700;color:#FEFBF3;margin-bottom:2px;}
.home-infocard-sub{font-size:.73rem;color:rgba(254,251,243,.45);margin-bottom:16px;}
.home-infocard-divider{height:1px;background:rgba(254,251,243,.1);margin-bottom:16px;}
.home-infocard-label{font-size:.62rem;color:rgba(254,251,243,.35);margin-bottom:4px;}
.home-infocard-name{font-weight:700;color:#FEFBF3;font-size:.88rem;}
.home-infocard-role{font-size:.67rem;color:rgba(254,251,243,.45);margin-top:2px;text-transform:capitalize;}
/* ── Home: module section ── */
.home-modules{padding:40px 48px 56px;background:#FEFBF3;}
.home-section-tag{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:#c96a4a;font-weight:700;margin-bottom:6px;}
.home-section-title{font-family:'Playfair Display',Georgia,serif;font-size:1.55rem;font-weight:700;color:#1F1A12;margin-bottom:30px;letter-spacing:-.01em;}
.home-mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid rgba(31,26,18,.08);border-radius:12px;overflow:hidden;}
.home-modbtn{background:#FEFBF3;border:none;border-right:1px solid rgba(31,26,18,.07);border-bottom:1px solid rgba(31,26,18,.07);padding:24px 20px 20px;display:flex;flex-direction:column;align-items:flex-start;cursor:pointer;transition:background .16s;text-align:left;}
.home-modbtn:nth-child(3n){border-right:none;}
.home-modbtn:hover{background:#F6EFE2;}
.home-modbtn:active{background:#ede5d4;}
.home-mod-ico-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;flex-shrink:0;background:#F6EFE2;}
.home-mod-ico{font-size:1.3rem;line-height:1;}
.home-mod-lbl{font-size:.9rem;font-weight:700;color:#1F1A12;line-height:1.3;letter-spacing:-.01em;margin-bottom:5px;}
.home-mod-desc{font-size:.74rem;color:rgba(31,26,18,.4);line-height:1.45;flex:1;}
.home-mod-arrow{font-size:.7rem;color:#c96a4a;font-weight:700;margin-top:12px;letter-spacing:.04em;}
/* ── Home alerts strip ── */
.home-alerts{padding:0 48px;}
/* ── Tablet overrides ── */
@media(max-width:900px){
  .home-hero{padding:36px 28px 40px;}
  .home-modules{padding:24px 22px 32px;}
  .home-alerts{padding:0 22px;}
  .home-mod-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:900px) and (min-width:601px){
  .sidebar{width:58px;}
  .snav span:not(.sni){display:none;}
  .sidebar-brand p,.sidebar-user-info{display:none;}
  .sidebar-footer .sidebar-acct{font-size:0;padding:8px;}
  .sidebar-footer .sidebar-acct::before{content:"99";font-size:1rem;}
  .sidebar-brand h1{font-size:0;visibility:hidden;}
  .sidebar-brand{padding:14px 8px;}
  .sidebar-user{justify-content:center;padding:10px 8px;}
  .sidebar-footer{padding:8px;}
  .sidebar-logout{font-size:0;padding:8px;}
  .sidebar-logout::before{content:"FB";font-size:1rem;}
  .snav{justify-content:center;margin:2px 4px;padding:10px 0;}
}
.mob-topbar{display:none;background:#1F1A12;border-bottom:1px solid rgba(254,251,243,.08);padding:10px 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.mob-topbar-brand{font-size:.9rem;font-weight:700;color:#FEFBF3;font-family:'Playfair Display',Georgia,serif;}
.mob-topbar-right{display:flex;gap:8px;}
.mob-ham{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:4px;border-radius:6px;}
.mob-ham span{display:block;width:20px;height:2px;background:#FEFBF3;border-radius:2px;transition:all .2s;}
.mob-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;}
.mob-backdrop.mob-open{display:block;}
@media(max-width:600px){
  .sidebar{position:fixed;top:0;left:-260px;height:100vh;z-index:300;transition:left .25s ease;overflow-y:auto;}

<div id="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let RESIDENTS=[];
let CONSULTANTS=[];
let MENTORS={};
const ROTA_PERIODS=["28/9-25/10","26/10-22/11","23/11-20/12","21/12-17/1","18/1-14/2","15/2-14/3","15/3-11/4","12/4-9/5","10/5-6/6","7/6-4/7","5/7-1/8","2/8-29/8","30/8-26/9"];
// Blocks/academic year are computed from today's date instead of hand-updated each month,
// so the app never falls out of sync with the calendar (each block = 4 fixed weeks;
// the academic year runs Oct 1 - Sep 30, matching residents.year_started convention).
function computeCurrentBlock(today){
  today=today||new Date();
  const m=today.getMonth();
  const y=m>=9?today.getFullYear():today.getFullYear()-1;
  for(let i=0;i<ROTA_PERIODS.length;i++){
    const[startStr,endStr]=ROTA_PERIODS[i].split("-");
    const[sd,sm]=startStr.split("/").map(Number);
    const[ed,em]=endStr.split("/").map(Number);
    const startYear=(i===0&&sm===9)?y:(sm>=10?y:y+1);
    const endYear=(i===ROTA_PERIODS.length-1&&em===9)?y+1:(em>=10?y:y+1);
    const start=new Date(startYear,sm-1,sd,0,0,0);
    const end=new Date(endYear,em-1,ed,23,59,59);
    if(today>=start&&today<=end)return{block:i+1,academicYear:y};
  }
  return{block:13,academicYear:y};
}
const __CUR=computeCurrentBlock();
const CURRENT_PERIOD=__CUR.block;
const CURRENT_ACADEMIC_YEAR=__CUR.academicYear;
// Full rota grid is DB-backed (table `rotations`, see migration_004_rotations.sql) —
// loaded per academic year by loadRotations() below. Keyed by real resident_id
// (matches the `residents` table ids, not any hardcoded demo numbering).
// ROTA_LEAVE_META holds the "2wks Annual/Maternity Leave + rest-of-block rotation"
// split-block case produced by the Excel rota importer (or set manually):
// ROTA_LEAVE_META[residentId][block] = {weeks:2, position:'start'|'end', kind:'annual'|'maternity'}
let FULL_ROTA={};
let ROTA_LEAVE_META={};
// Chief Resident designation (one chief, one co-chief max)
let CHIEF_RES_ID=null;
let CO_CHIEF_RES_ID=null;
const MANDATORY=["GIM/CTU","Cardiology","Pulmonology","Nephrology","Gastroenterology","Endocrinology","Hematology","Rheumatology","Neurology","Infectious Disease","ICU","Emergency Medicine","Oncology"];
// Ongoing 60%: Quiz 20 | MM 15 | Teaching 15 | Presentations 10
// Yearly 40%: Committee 10 | QI 5 | Publication 5 | Oral 5 | Poster 3 | Awards 4 | Volunteering 3 (bonus system removed)
// Quarterly: informational only — not scored
const KPI_W={quiz:20,mm:15,teach:15,pres:10,comm:10,qi:5,pub:5,oral:5,poster:3,awards:4,volunteering:3};
const LC={R1:"#4a6a8a",R2:"#5a8a6a",R3:"#c9913a",R4:"#8a4a2a"};
const ROT_COLORS={"GIM/CTU":{bg:"#ede9fe",tx:"#5b21b6"},"Night Duty":{bg:"#fef2f2",tx:"#991b1b"},"ICU":{bg:"rgba(38,82,58,.12)",tx:"#26523A"},"Cardiology":{bg:"rgba(201,106,74,.12)",tx:"#9d174d"},"Pulmonology":{bg:"#e0f2fe",tx:"#0c4a6e"},"Nephrology":{bg:"rgba(127,184,156,.15)",tx:"#26523A"},"Gastroenterology":{bg:"rgba(164,122,40,.12)",tx:"#6a4c10"},"Endocrinology":{bg:"#f0fdf4",tx:"#166534"},"Hematology":{bg:"#ffe4e6",tx:"#9f1239"},"Rheumatology":{bg:"#f5f3ff",tx:"#4c1d95"},"Neurology":{bg:"#fdf4ff",tx:"#7e22ce"},"Infectious Disease":{bg:"#fff7ed",tx:"#c2410c"},"Emergency Medicine":{bg:"#fee2e2",tx:"#7f1d1d"},"Oncology":{bg:"#f0f9ff",tx:"#0369a1"},"Outpatient Clinic":{bg:"#F6EFE2",tx:"#475569"},"Elective":{bg:"#f0fdf4",tx:"#166534"},"Annual Leave":{bg:"#fefce8",tx:"#854d0e"},"Maternity Leave":{bg:"#fdf4ff",tx:"#701a75"},"Medical Consult":{bg:"#eff6ff",tx:"#26523A"}};
const ROT_ABBR={"GIM/CTU":"CTU","Night Duty":"Night","ICU":"ICU","Cardiology":"Cardio","Pulmonology":"Pulmo","Nephrology":"Nephro","Gastroenterology":"Gastro","Endocrinology":"Endo","Hematology":"Hema","Rheumatology":"Rheuma","Neurology":"Neuro","Infectious Disease":"ID","Emergency Medicine":"ER","Oncology":"Onco","Outpatient Clinic":"Clinic","Elective":"Elect","Annual Leave":"Leave","Maternity Leave":"Matern","Medical Consult":"M.Cons"};
const ALL_ROTATIONS=["GIM/CTU","Night Duty","ICU","Cardiology","Pulmonology","Nephrology","Gastroenterology","Endocrinology","Hematology","Rheumatology","Neurology","Infectious Disease","Emergency Medicine","Oncology","Outpatient Clinic","Elective","Annual Leave","Maternity Leave","Medical Consult"];
let ROT_H={};
// ─── ROTA EXCEL IMPORT — parsing/classification helpers ─────────────────────
// Pure functions (no DOM, no Supabase) so they can be unit-tested directly.
// Expected sheet layout (matches the committee's distributed rota spreadsheet):
//   row 1: block numbers (1-13) starting a couple columns in
//   row 2: date ranges (not parsed — ROTA_PERIODS is the source of truth for those)
//   row 3+: PG level | resident name | 13 block cells
const ROTA_ALIAS_MAP={ "matrnty":"Maternity Leave","maternity":"Maternity Leave","mat leave":"Maternity Leave", "vacation":"Annual Leave","annual leave":"Annual Leave","leave":"Annual Leave","al":"Annual Leave", "m.con":"Medical Consult","m.cons":"Medical Consult","mcons":"Medical Consult","med consult":"Medical Consult", "er":"Emergency Medicine","er main":"Emergency Medicine","em":"Emergency Medicine", "2w":"2wks","2wk":"2wks","2wks":"2wks"
};
function normalizeRotToken(tok){
  tok=(tok==null?"":String(tok)).trim();
  if(!tok)return "";
  const low=tok.toLowerCase();
  if(ROTA_ALIAS_MAP[low])return ROTA_ALIAS_MAP[low];
  const fullMatch=ALL_ROTATIONS.find(r=>r.toLowerCase()===low);
  if(fullMatch)return fullMatch;
  const abbrMatch=Object.entries(ROT_ABBR).find(([full,ab])=>ab.toLowerCase()===low);
  if(abbrMatch)return abbrMatch[0];
  const containsMatch=ALL_ROTATIONS.find(r=>r.toLowerCase()===low||r.toLowerCase().includes(low)||(low.length>=3&&low.includes(r.toLowerCase())));
  if(containsMatch)return containsMatch;
  return tok;
}
// Classifies one rota cell's raw text into a structured rotation/leave record.
// Returns one of:
//   {type:"empty"}
//   {type:"rotation", rotationName}
//   {type:"leave", kind:"annual"|"maternity", rotationName}
//   {type:"split", weeks:2, position:"start"|"end", rotationName}   (rest-of-block rotation)
//   {type:"unknown", rotationName}   (raw token not recognized — needs manual review)
function classifyRotaCell(raw){
  const trimmed=(raw==null?"":String(raw)).trim();
  if(!trimmed||trimmed==="-"||trimmed==="—"||trimmed==="/")return{type:"empty"};
  const direct=normalizeRotToken(trimmed);
  if(ALL_ROTATIONS.includes(direct)){
    if(direct==="Annual Leave")return{type:"leave",kind:"annual",rotationName:"Annual Leave"};
    if(direct==="Maternity Leave")return{type:"leave",kind:"maternity",rotationName:"Maternity Leave"};
    return{type:"rotation",rotationName:direct};
  }
  if(trimmed.includes("/")){
    const parts=trimmed.split("/").map(s=>s.trim()).filter(Boolean);
    if(parts.length===2){
      const norm=parts.map(normalizeRotToken);
      const idxLeave=norm.findIndex(x=>x==="2wks");
      if(idxLeave!==-1){
        const other=norm[1-idxLeave];
        // If the other token is itself a leave type (e.g. "2wks/Matrnty"), treat as split leave
        if(other==="Maternity Leave")return{type:"split",weeks:2,position:idxLeave===0?"start":"end",kind:"maternity",rotationName:"Maternity Leave"};
        if(other==="Annual Leave")return{type:"split",weeks:2,position:idxLeave===0?"start":"end",kind:"annual",rotationName:"Annual Leave"};
        return{type:"split",weeks:2,position:idxLeave===0?"start":"end",rotationName:other};
      }
      // Both tokens are distinct recognized rotations → dual-rotation block (2 weeks each)
      const r0=norm[0],r1=norm[1];
      const r0ok=ALL_ROTATIONS.includes(r0)&&r0!=="Annual Leave"&&r0!=="Maternity Leave";
      const r1ok=ALL_ROTATIONS.includes(r1)&&r1!=="Annual Leave"&&r1!=="Maternity Leave";
      if(r0ok&&r1ok)return{type:"dual_rotation",weeks:2,rotationName:r0,rotationName2:r1};
    }
  }
  return{type:"unknown",rotationName:direct||trimmed};
}
// Parses a worksheet already converted to an array-of-arrays (XLSX.utils.sheet_to_json(ws,{header:1,raw:false})).
// Returns {blockCols:[1..13 in the order the columns appeared], residents:[{rowIndex,level,name,cells:{block:rawText}}]}
function parseRotaSheet(aoa){
  if(!aoa||aoa.length<3)throw new Error("Sheet has too few rows — expected a block-number row, a date row, then resident rows.");
  const headerRow=aoa[0]||[];
  const blockCols=[];
  for(let c=0;c<headerRow.length;c++){
    const n=parseInt(headerRow[c]);
    if(!isNaN(n)&&n>=1&&n<=13)blockCols.push({col:c,block:n});
  }
  if(blockCols.length===0)throw new Error("Could not find block-number columns in row 1 (expected numbers 1-13).");
  const firstBlockCol=Math.min(...blockCols.map(b=>b.col));
  // Detect which of the leading columns hold the resident's name / PGY level by
  // scanning the header labels first (handles files with an extra serial-number
  // column before "PG"/"Name", like the committee's real export); fall back to
  // fixed positions immediately before the first block column if no label matches.
  let nameCol=-1,levelCol=-1;
  for(let c=0;c<firstBlockCol;c++){
    const h=(headerRow[c]==null?"":String(headerRow[c])).trim().toLowerCase();
    if(nameCol===-1&&h==="name")nameCol=c;
    if(levelCol===-1&&/^(pg|pgy|level)/.test(h))levelCol=c;
  }
  if(nameCol===-1)nameCol=firstBlockCol-1;
  if(levelCol===-1)levelCol=firstBlockCol-2;
  const residents=[];
  for(let r=2;r<aoa.length;r++){
    const row=aoa[r]||[];
    const name=(nameCol>=0&&row[nameCol]!=null?String(row[nameCol]):"").trim();
    if(!name)continue;
    const level=(levelCol>=0&&row[levelCol]!=null?String(row[levelCol]):"").trim();
    const cells={};
    blockCols.forEach(({col,block})=>{cells[block]=(row[col]==null?"":String(row[col])).trim();});
    residents.push({rowIndex:r+1,level,name,cells});
  }
  return{blockCols:blockCols.map(b=>b.block),residents};
}
function normalizePersonName(s){
  return (s||"").toLowerCase().replace(/^dr\.?\s*/,"").replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();
}
// Best-effort fuzzy match of an Excel resident name against the live RESIDENTS roster.
// Returns {match:resident|null, confidence:0..1}. Confidence < 0.8 (or no match) should
// be surfaced to the PD for manual selection before the import is committed.
function matchResidentByName(excelName,pool){
  const norm=normalizePersonName(excelName);
  if(!norm)return{match:null,confidence:0};
  const exact=pool.find(r=>normalizePersonName(r.name)===norm);
  if(exact)return{match:exact,confidence:1};
  const containing=pool.filter(r=>{
    const rn=normalizePersonName(r.name);
    return rn.includes(norm)||norm.includes(rn);
  });
  if(containing.length===1)return{match:containing[0],confidence:0.85};
  const tokens=norm.split(" ").filter(Boolean);
  let best=null,bestScore=0;
  pool.forEach(r=>{
    const rtokens=normalizePersonName(r.name).split(" ").filter(Boolean);
    if(!rtokens.length||!tokens.length)return;
    const overlap=tokens.filter(t=>rtokens.includes(t)).length;
    const score=overlap/Math.max(tokens.length,rtokens.length);
    if(score>bestScore){bestScore=score;best=r;}
  });
  if(best&&bestScore>=0.5)return{match:best,confidence:bestScore};
  return{match:null,confidence:0};
}

function gimSlotCount(level){
  if(level==="R1")return 6;
  if(level==="R2"||level==="R3")return 4;
  return 0; // R4 graduating — not applicable
}
function nextAYLevel(level){
  const map={R1:"R2",R2:"R3",R3:"R4"};
  return map[level]||null; // R4 -> null, graduating, not applicable next AY
}
function gimIsOpen(){
  if(!GIM_STATUS||!GIM_STATUS.is_open)return false;
  if(GIM_STATUS.deadline){const dl=new Date(GIM_STATUS.deadline);if(dl<new Date())return false;}
  return true;
}
function gimDeadlineCountdown(){
  if(!GIM_STATUS?.deadline)return null;
  const diff=new Date(GIM_STATUS.deadline)-new Date();
  if(diff<=0)return"Window closed";
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const mn=Math.floor((diff%3600000)/60000);
  if(d>0)return d+"d "+h+"h left";
  if(h>0)return h+"h "+mn+"m left";
  return mn+"m left";
}
function gimLeaveBlocks(residentId){

  const s=new Set();
  if(plan.first_leave_block)s.add(plan.first_leave_block);

  return s;
}

async function loadCumulativeKpi(resId){

  if(!res){CUMULATIVE_KPI_LOADING=false;return;}
  const startYear=res.yearStarted||CURRENT_ACADEMIC_YEAR;

  for(let y=startYear;y<=CURRENT_ACADEMIC_YEAR;y++)years.push(y);
  const[scRes,qRes,prRes]=await Promise.all([
    sb.from("kpi_scores").select("*").eq("resident_id",resId).in("academic_year",years),
    sb.from("kpi_quarterly").select("*").eq("resident_id",resId).in("academic_year",years),

  render();
}

async function loadLeaveRecords(){

  RESIDENTS.forEach(r=>{if(!LEAVE_DATA[r.id])LEAVE_DATA[r.id]={rota:[],manual:[],absences:[],requests:[]};});
  Object.values(LEAVE_DATA).forEach(ld=>{ld.manual=[];ld.absences=[];ld.requests=[];});
  (error?[]:(data||[])).forEach(row=>{
    if(!LEAVE_DATA[row.resident_id])LEAVE_DATA[row.resident_id]={rota:[],manual:[],absences:[],requests:[]};

      LEAVE_DATA[row.resident_id].manual.push({id:row.id,from:row.from_date,to:row.to_date,days:row.days,comment:row.comment,approved:row.approved});

function downloadRotationICS(resId){
  const res=resById(resId);if(!res)return;
  const fullRota=FULL_ROTA[resId]||{};
  function icsDate(d){return d.toISOString().split("T")[0].replace(/-/g,"");}
  function icsEscape(s){return(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");}
  const uid=()=>Math.random().toString(36).slice(2,10);
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//DSFH//Residency Portal//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH", "X-WR-CALNAME:"+icsEscape(res.name)+" — DSFH IM","X-WR-TIMEZONE:Asia/Riyadh"];

  // 1 ── Rotation blocks (all-day, 4-week spans)
  ROTA_PERIODS.forEach((_,i)=>{
    const blockNum=i+1;
    const rot=fullRota[String(blockNum)];if(!rot)return;
    const start=blockStartDate(blockNum,CURRENT_ACADEMIC_YEAR);if(!start)return;
    const endExcl=new Date(start.getTime()+28*86400000);
    lines.push("BEGIN:VEVENT", "DTSTART;VALUE=DATE:"+icsDate(start), "DTEND;VALUE=DATE:"+icsDate(endExcl), "SUMMARY:B"+blockNum+" – "+icsEscape(ROT_ABBR[rot]||rot), "DESCRIPTION:"+icsEscape(res.name+" • Block "+blockNum+" • "+rot+" • DSFH IM"), "CATEGORIES:Rotation", "COLOR:green", "UID:dsfh-rot-"+resId+"-b"+blockNum+"@dsfh.local", "END:VEVENT");
  });

  // 2 ── Approved leave blocks
  const ld=LEAVE_DATA[resId]||{};
  (ld.manual||[]).filter(x=>x.approved&&x.from&&x.to).forEach(lv=>{
    const isEdu=lv.comment?.startsWith("[EDU]");
    const endD=new Date(new Date(lv.to).getTime()+86400000);
    lines.push("BEGIN:VEVENT", "DTSTART;VALUE=DATE:"+lv.from.replace(/-/g,""), "DTEND;VALUE=DATE:"+endD.toISOString().split("T")[0].replace(/-/g,""), "SUMMARY:"+(isEdu?" Educational Leave":" Annual Leave")+" ("+lv.days+"d)", "DESCRIPTION:"+icsEscape((lv.comment?.replace("[EDU] ","")||"Approved leave")+" • "+res.name), "CATEGORIES:Leave", "UID:dsfh-leave-"+resId+"-"+uid()+"@dsfh.local", "END:VEVENT");
  });

  // 3 ── MM Presentations & Moderator duties
  MM_SESSIONS.forEach(s=>{
    let role=null;
    if(s.presenter_resident_id===resId)role=" MM Presenter";
    else if(s.moderator_resident_id===resId)role=" MM Moderator";
    if(!role)return;
    const d=s.session_date;
    lines.push("BEGIN:VEVENT", "DTSTART;TZID=Asia/Riyadh:"+d.replace(/-/g,"")+"T080000", "DTEND;TZID=Asia/Riyadh:"+d.replace(/-/g,"")+"T090000", "SUMMARY:"+icsEscape(role+": "+s.topic), "DESCRIPTION:"+icsEscape("Block "+s.block_number+" • "+fmtDate(d)+" • DSFH Morning Meeting"), "CATEGORIES:Presentation", "UID:dsfh-pres-"+resId+"-"+s.id+"@dsfh.local", "END:VEVENT");
  });

  // 4 ── Announcements / KPI task deadlines targeting this resident
  announcementsForResident(resId).filter(a=>a.deadline_date).forEach(a=>{
    const icon=ANN_ICON[a.category]||"";
    lines.push("BEGIN:VEVENT", "DTSTART;VALUE=DATE:"+a.deadline_date.replace(/-/g,""), "DTEND;VALUE=DATE:"+a.deadline_date.replace(/-/g,""), "SUMMARY:"+icsEscape(icon+" "+a.title+" — DUE"), "DESCRIPTION:"+icsEscape((a.description||"")+" • DSFH IM Residency"), "CATEGORIES:Deadline", "UID:dsfh-ann-"+a.id+"@dsfh.local", "END:VEVENT");
  });

  lines.push("END:VCALENDAR");
  const blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;
  a.download=res.name.replace(/\s+/g,"_")+"_AY"+CURRENT_ACADEMIC_YEAR+"_"+String(CURRENT_ACADEMIC_YEAR+1).slice(-2)+".ics";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="cls")e.className=v;
    else if(k==="st")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(typeof v==="boolean"){if(v)e.setAttribute(k,"");}else e.setAttribute(k,v);
  });
  kids.flat(9).forEach(c=>{
    if(c==null||c===false)return;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}

function calcKPI(id){
  let mmAtt=0,mmTotal=0,mmScore=0;
  Object.values(MM_ATT).forEach(blk=>{Object.values(blk).forEach(day=>{const s=day[id];if(!s)return;mmTotal++;if(s==='P'||s==='E'||s==='O'){mmAtt++;mmScore+=1;}else if(s==='L'){mmAtt++;mmScore+=0.5;}});});
  if(mmTotal===0){mmScore=1;mmTotal=1;}
  const mmPct=Math.round(mmScore/mmTotal*100);
  let tAtt=0,tTotal=0,tScore=0;
  Object.values(TEACH_ATT).forEach(blk=>{Object.values(blk).forEach(day=>{const s=day[id];if(!s)return;tTotal++;if(s==='P'||s==='E'||s==='O'){tAtt++;tScore+=1;}else if(s==='L'){tAtt++;tScore+=0.5;}});});
  if(tTotal===0){tScore=1;tTotal=1;}
  const tPct=Math.round(tScore/tTotal*100);
  const rotPct=Math.round(((ROT_H[id]||[]).length/MANDATORY.length)*100);
  const pubQ=QUIZZES.filter(q=>q.published&&q.sc[id]!=null);
  const qAvg=pubQ.length?Math.round(pubQ.reduce((a,q)=>a+Math.round(q.sc[id]/q.max*100),0)/pubQ.length):0;
  const pres=MM_SESSIONS.some(m=>m.presenter_resident_id===id)||MM_SESSIONS.some(m=>m.moderator_resident_id===id);
  const presCount=MM_SESSIONS.filter(m=>m.presenter_resident_id===id||m.moderator_resident_id===id).length;
  const commPct=Math.round(((COMM_SC[id]||0)/10)*100);
  const ks=KPI_SCORES[id]||{};
  const af=getApprovedFields(id);
  const qiPct=(ks.qiDone||af.has("qi"))?100:0;
  const pubPct=(ks.bonusPublished||af.has("publication"))?100:0;
  const oralPct=(ks.bonusOral||af.has("oral"))?100:0;
  const posterPct=(ks.bonusPoster||af.has("poster"))?100:0;
  const awardsPct=(ks.awardsHonors||af.has("awards"))?100:0;
  const volunteeringPct=(ks.volunteering||af.has("volunteering"))?100:0;
  const overall=Math.round(
    qAvg*KPI_W.quiz/100+mmPct*KPI_W.mm/100+tPct*KPI_W.teach/100+
    (pres?100:0)*KPI_W.pres/100+commPct*KPI_W.comm/100+
    qiPct*KPI_W.qi/100+pubPct*KPI_W.pub/100+oralPct*KPI_W.oral/100+
    posterPct*KPI_W.poster/100+awardsPct*KPI_W.awards/100+volunteeringPct*KPI_W.volunteering/100
  );
  return{mmPct,mmAtt,mmTotal,tPct,tAtt,tTotal,rotPct,qAvg,pres,presCount,commPct,
    qiPct,pubPct,oralPct,posterPct,awardsPct,volunteeringPct,overall};
}

  const q=currentQuarter(),ay=CURRENT_ACADEMIC_YEAR;

}

  return BEST_VOTES.find(v=>v.academic_year===ay&&v.quarter===q&&v.profile_id===STATE.user?.profileId)||null;

function brComputeRankings(){
  const seniors=sortByLevel(RESIDENTS.filter(r=>r.level==="R3"||r.level==="R4"));
  const juniors=sortByLevel(RESIDENTS.filter(r=>r.level==="R1"||r.level==="R2"));
  const totalVoters=brTotalVoters();
  function score(res,col){
    const kpi=kpiOngoingScore(res.id);
    const votes=brVoteCountFor(res.id,col);
    const votePct=totalVoters>0?Math.round(votes/totalVoters*100):0;
    const final=Math.round(kpi*0.5+votePct*0.5);
    return{res,kpi,votes,votePct,final};
  }
  const sRanked=seniors.map(r=>score(r,"senior")).sort((a,b)=>b.final-a.final);
  const jRanked=juniors.map(r=>score(r,"junior")).sort((a,b)=>b.final-a.final);
  return{sRanked,jRanked};
}
function brVotingIsOpen(){
  if(!BEST_STATUS||!BEST_STATUS.voting_open)return false;
  if(BEST_STATUS.voting_deadline){const dl=new Date(BEST_STATUS.voting_deadline);if(dl<new Date())return false;}
  return true;
}
function brDeadlineCountdown(){
  if(!BEST_STATUS?.voting_deadline)return null;
  const diff=new Date(BEST_STATUS.voting_deadline)-new Date();
  if(diff<=0)return"Voting closed";
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const mn=Math.floor((diff%3600000)/60000);
  if(d>0)return d+"d "+h+"h left";
  if(h>0)return h+"h "+mn+"m left";
  return mn+"m left";
}

function renderLogin(){
  async function doLogin(){
    const u=document.getElementById("lu").value.trim();
    const p=document.getElementById("lp").value.trim();
    const btn=document.getElementById("lbtn");
    const errEl=document.getElementById("lerr");
    errEl.textContent="";
    if(!u||!p){errEl.textContent="Enter a username and password";return;}
    btn.disabled=true;btn.textContent="Signing in…";
    const{data,error}=await sb.auth.signInWithPassword({email:u+"@"+AUTH_EMAIL_DOMAIN,password:p});
    if(error){
      errEl.textContent="Invalid username or password";
      btn.disabled=false;btn.textContent="Sign In";
      return;
    }
    const{data:profile,error:perr}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
    if(perr||!profile){
      errEl.textContent="No profile found for this account. Contact the PD.";
      await sb.auth.signOut();
      btn.disabled=false;btn.textContent="Sign In";
      return;
    }
    STATE.user=mapProfileToUser(profile);STATE.mod=null;
    await loadCoreData();
    loadPendingCounselCount();
    loadSchedules();
    loadRotations();
    loadLeaveRecords();
    loadAnnouncements();
    loadQuizzes().then(render);
    loadKpiQuarterly();
    loadKpiProposals();
    loadOncallData();
    loadBestResident();
    render();
  }
  return el("div",{cls:"login-wrap"},
    el("div",{cls:"login-card"},
      el("div",{cls:"login-logo"},
        el("div",{st:{fontSize:"2.5rem"}},""),
        el("h1",null,"DSFH Residency Portal"),
        el("p",null,"Dr. Solaiman Fakeeh Hospital · Internal Medicine")
      ),
      el("div",{st:{marginBottom:"12px"}},
        el("label",null,"Username"),
        el("input",{id:"lu",placeholder:"Enter username",onKeydown:e=>{if(e.key==="Enter")doLogin();}})
      ),
      el("div",{st:{marginBottom:"16px"}},
        el("label",null,"Password"),
        el("input",{id:"lp",type:"password",placeholder:"Enter password",onKeydown:e=>{if(e.key==="Enter")doLogin();}})
      ),
      el("p",{id:"lerr",cls:"err"}),
      el("button",{id:"lbtn",cls:"sbtn primary",st:{width:"100%"},onClick:doLogin},"Sign In")
    )
  );
}

function getMyDuties(){
  const u=STATE.user;
  if(!u||u.role!=="resident"||!u.rid)return[];
  const todayStr=new Date().toISOString().slice(0,10);
  const duties=[];
  MM_SESSIONS.forEach(s=>{
    if(s.session_date<todayStr)return;
    if(s.presenter_resident_id===u.rid)duties.push({role:"Presenter",session:s});
    if(s.moderator_resident_id===u.rid)duties.push({role:"Moderator",session:s});
  });
  duties.sort((a,b)=>a.session.session_date.localeCompare(b.session.session_date));
  return duties;
}

    const cv=document.getElementById("home-hero-cv");
    if(!cv)return;

    const ctx=cv.getContext("2d");
    // warm palette matching the hero gradient
    const COLS=["#c96a4a","#c9913a","#b07050","#9c6a4a","#d4a06a","#b08060","#e8c8a8","#d4b090"];
    const N=32;
    // mix of rect and circle shapes
    const pts=Array.from({length:N},(_,i)=>({
      x:Math.random()*hero.offsetWidth,
      y:Math.random()*hero.offsetHeight,
      type:i%3===0?"circle":"rect",
      w:4+Math.random()*8, h:7+Math.random()*12,
      r:Math.random()*Math.PI*2,
      angle:Math.random()*Math.PI*2,
      speed:0.08+Math.random()*0.18,
      phase:Math.random()*Math.PI*2,
      freq:0.006+Math.random()*0.008,
      amp:20+Math.random()*28,
      spin:(Math.random()-.5)*0.012,
      col:COLS[Math.floor(Math.random()*COLS.length)],
      op:0.12+Math.random()*0.16
    }));
    let raf;
    function resize(){cv.width=hero.offsetWidth;cv.height=hero.offsetHeight;}
    resize();
    const ro=new ResizeObserver(resize);ro.observe(hero);
    function draw(){
      if(!document.getElementById("home-hero-cv")){cancelAnimationFrame(raf);ro.disconnect();return;}
      ctx.clearRect(0,0,cv.width,cv.height);
      pts.forEach(p=>{
        p.phase+=p.freq; p.r+=p.spin;
        p.x+=Math.cos(p.angle)*p.speed + Math.sin(p.phase)*p.amp*p.freq*Math.cos(p.angle+Math.PI/2);
        p.y+=Math.sin(p.angle)*p.speed + Math.sin(p.phase)*p.amp*p.freq*Math.sin(p.angle+Math.PI/2);
        if(p.x<-20)p.x=cv.width+20; if(p.x>cv.width+20)p.x=-20;
        if(p.y<-20)p.y=cv.height+20; if(p.y>cv.height+20)p.y=-20;
        ctx.save(); ctx.globalAlpha=p.op; ctx.fillStyle=p.col;
        ctx.translate(p.x,p.y); ctx.rotate(p.r);
        if(p.type==="circle"){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
        else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
        ctx.restore();
      });
      raf=requestAnimationFrame(draw);
    }
    draw();
  },0);

  // ── Right-side portal info card ──────────────────────────────
  const infoCard=el("div",{cls:"home-infocard"},

      const ctx=cv.getContext("2d");

      const pieces=Array.from({length:120},()=>({
        x:Math.random()*cv.width,y:-20-Math.random()*200,

        r:5+Math.random()*6,a:Math.random()*Math.PI*2,va:(Math.random()-.5)*.1,

          p.x+=p.vx;p.y+=p.vy;p.a+=p.va;p.vy+=.05;
          ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-frame/160);

        });

      }

// ─── Morning Meeting auto-date generator ─────────────────────────────────────
// Parse ROTA_PERIODS[idx] start date for a given academic year.
function blockStartDate(blockNum,academicYear){
  const idx=blockNum-1;
  const period=ROTA_PERIODS[idx];if(!period)return null;
  const[startStr]=period.split("-");
  const[sd,sm]=startStr.split("/").map(Number);
  const year=(sm>=9)?academicYear:academicYear+1;
  return new Date(year,sm-1,sd,0,0,0);
}
// Generate Sunday–Thursday dates for each of the 4 weeks of a block (5 days × 4 weeks = 20 sessions).
function mmDatesForBlock(blockNum,academicYear){
  const start=blockStartDate(blockNum,academicYear);if(!start)return[];
  const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dates=[];
  for(let wk=0;wk<4;wk++){
    [0,1,2,3,4].forEach(dow=>{
      const d=new Date(start.getTime()+(wk*7+dow)*86400000);
      dates.push({date:d.toISOString().split("T")[0],day:DAY_NAMES[d.getDay()],week:wk+1});
    });
  }
  return dates;
}
async function generateMMSessions(blk){
  showConfirm("Auto-generate Sunday–Thursday session slots (20 total) for Block "+blk+"? Only dates not already in the schedule will be added.",async()=>{
    const dates=mmDatesForBlock(blk,CURRENT_ACADEMIC_YEAR);
    if(!dates.length){showToast("Could not compute dates for Block "+blk);return;}
    const existingDates=new Set(MM_SESSIONS.filter(s=>s.block_number===blk).map(s=>s.session_date));
    const toInsert=dates.filter(d=>!existingDates.has(d.date));
    if(!toInsert.length){showToast("All session slots for Block "+blk+" already exist.","warning");return;}
    const rows=toInsert.map(d=>({
      academic_year:CURRENT_ACADEMIC_YEAR,block_number:blk,week_number:4*(blk-1)+d.week-1,
      session_date:d.date,day_label:d.day,topic:"",created_by:STATE.user?.profileId||null
    }));
    const{error}=await sb.from("mm_sessions").insert(rows);
    if(error){showToast("Could not generate sessions: "+error.message);return;}
    await loadSchedules();
    showToast("Sessions generated for Block "+blk,"success");
  },"Generate","primary");
}

  let attMap={};
  let cmtMap={};
  function loadSession(dateStr){
    vr.forEach(r=>{
      attMap[r.id]=((TEACH_ATT[blk]||{})[dateStr]||{})[r.id]||null;
      cmtMap[r.id]=((TEACH_ATT_CMT[blk]||{})[dateStr]||{})[r.id]||"";
    });

    const rows=vr.filter(r=>attMap[r.id]).map(r=>({session_id:sessionId,resident_id:r.id,status:attMap[r.id],comment:cmtMap[r.id]||null,marked_by:STATE.user.profileId}));

  const rowsEl=el("div",null);

    const cmtInput=el("input",{cls:"att-cmt-input",type:"text",placeholder:"Comment (optional)",value:cmtMap[r.id]||"",st:{flex:"1",fontSize:".78rem",padding:"3px 8px",borderRadius:"6px",border:"1px solid #ede5d8",background:"#faf6f1",minWidth:"0"}});
    cmtInput.oninput=()=>{cmtMap[r.id]=cmtInput.value;};
    const row=el("div",{id:"teachrow_"+r.id,st:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0",borderBottom:"1px solid #ede5d8",flexWrap:"wrap"}},
      el("div",{st:{minWidth:"150px",flexShrink:"0"}},el("div",{cls:"flex-gap"},avEl(r),el("span",{cls:"name",st:{fontSize:".82rem"}},r.name))),
      el("div",{st:{display:"flex",gap:"4px",flexShrink:"0"}},
        ...["P","L","A","E","O"].map(s=>{
          const btn=el("button",{cls:"att-btn att-btn-"+s+(attMap[r.id]===s?" sel-"+s:"")},s);
          btn.onclick=()=>{

          };

function renderPromoModal(){
  const nextLvl={R1:"R2",R2:"R3",R3:"R4"};
  const lvlOrd={R4:0,R3:1,R2:2,R1:3};
  const sorted=RESIDENTS.slice().sort((a,b)=>(lvlOrd[a.level]||9)-(lvlOrd[b.level]||9)||a.name.localeCompare(b.name));
  async function confirmPromo(){
    const btn=document.getElementById("promo_confirm_btn");
    if(btn){btn.disabled=true;btn.textContent="Saving…";}
    const changes=[];
    for(const r of sorted){
      if(STATE.promoSkip[r.id])continue;
      if(r.level==="R4"){
        await sb.from("residents").update({active:false}).eq("id",r.id);
        changes.push({id:r.id,name:r.name,from:"R4",to:"archived"});

// ─── ATTENDANCE EXPORT ───────────────────────────────────────────────────────
function exportAttendance(type, blk){
  const isMM = type === "mm";
  const sessions = (isMM ? MM_SESSIONS : TEACH_SESSIONS)
    .filter(s => s.block_number === blk)
    .slice().sort((a,b) => a.session_date.localeCompare(b.session_date));
  const ATT = isMM ? MM_ATT : TEACH_ATT;
  const vr = visRes();
  const headers = ["Resident","Level", ...sessions.map(s => fmtDate(s.session_date)+"\n"+s.topic), "Att %"];
  const rows = vr.map(r => {
    let present = 0;
    const cols = sessions.map(s => {
      const st = ((ATT[blk]||{})[s.session_date]||{})[r.id] || "";
      if(st==="P"||st==="L"||st==="E") present++;
      return st || "—";
    });
    const pct = sessions.length ? Math.round(present/sessions.length*100)+"%" : "—";
    return [r.name, r.level, ...cols, pct];
  });
  const aoa = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"] = [{wch:24},{wch:6},...sessions.map(()=>({wch:14})),{wch:7}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Attendance");
  XLSX.writeFile(wb, (isMM?"MM":"Teaching")+"_Attendance_Block"+blk+".xlsx");
}

// ─── QUARTERLY KPI HELPERS ───────────────────────────────────────────────────
// Quarters follow the academic year: Q1 Oct–Dec (B1-3), Q2 Jan–Mar (B4-6),
// Q3 Apr–Jun (B7-9), Q4 Jul–Sep (B10-13).
const QUARTER_BLOCKS={1:[1,2,3],2:[4,5,6],3:[7,8,9],4:[10,11,12,13]};
const QUARTER_LABELS={1:"Q1 Oct–Dec",2:"Q2 Jan–Mar",3:"Q3 Apr–Jun",4:"Q4 Jul–Sep"};
function currentQuarter(){
  const m=new Date().getMonth()+1;
  if(m>=10)return 1;
  if(m<=3)return 2;
  if(m<=6)return 3;
  return 4;
}
// Attendance + quiz stats for a specific resident within the given block list.
function calcKPIQ(id,qBlocks){
  let mmAtt=0,mmTotal=0,mmScore=0,tAtt=0,tTotal=0,tScore=0;
  qBlocks.forEach(blk=>{
    const blkAtt=MM_ATT[blk]||{};
    Object.values(blkAtt).forEach(day=>{const s=day[id];if(!s)return;mmTotal++;if(s==='P'||s==='E'||s==='O'){mmAtt++;mmScore+=1;}else if(s==='L'){mmAtt++;mmScore+=0.5;}});
    const tBlk=TEACH_ATT[blk]||{};
    Object.values(tBlk).forEach(day=>{const s=day[id];if(!s)return;tTotal++;if(s==='P'||s==='E'||s==='O'){tAtt++;tScore+=1;}else if(s==='L'){tAtt++;tScore+=0.5;}});
  });
  const mmPct=mmTotal?Math.round(mmScore/mmTotal*100):null;
  const tPct=tTotal?Math.round(tScore/tTotal*100):null;
  const pubQ=QUIZZES.filter(q=>q.published&&q.sc[id]!=null&&qBlocks.includes(q.block));
  const qAvg=pubQ.length?Math.round(pubQ.reduce((a,q)=>a+Math.round(q.sc[id]/q.max*100),0)/pubQ.length):null;
  const presCount=MM_SESSIONS.filter(s=>s.presenter_resident_id===id&&qBlocks.includes(s.block_number)).length;
  return{mmPct,mmAtt,mmTotal,tPct,tAtt,tTotal,qAvg,quizCount:pubQ.length,presCount};
}

function renderQuarterlyKPICard(resId){

        el("h1",{st:{fontFamily:"'Playfair Display',serif",fontSize:"2rem",fontWeight:"400",color:"#1F1A12",marginBottom:"4px"}},"Training Record")

  const startYear=res.yearStarted||CURRENT_ACADEMIC_YEAR;
  const years=[];
  for(let y=startYear;y<=CURRENT_ACADEMIC_YEAR;y++)years.push(y);
  const yearsDesc=[...years].reverse();
  const expandedYear=STATE.cumKpiYear;
  const lvlNums={R1:1,R2:2,R3:3,R4:4};
  const lvlNames={1:"R1",2:"R2",3:"R3",4:"R4"};
  function levelForYear(year){

    {pk:"volunteering",label:"Volunteer",icon:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/>'}
  ];

}
// ─── KPI DASHBOARD ───────────────────────────────────────────────────────────

  const isMyRes=isResident()&&u.rid===res.id;

  // ── Achievement card with proposal/approval flow ──────────────

    if(m.event)rows.push(el("div",{cls:"sh"},"Event: "+m.event));
    if(m.date)rows.push(el("div",{cls:"sh"},"Date: "+m.date));
    if(m.issuer)rows.push(el("div",{cls:"sh"},"Issuing body: "+m.issuer));
    if(m.organization)rows.push(el("div",{cls:"sh"},"Organization: "+m.organization));
    if(m.description)rows.push(el("div",{cls:"sh"},"Description: "+m.description));

    return rows.length?el("div",{st:{marginBottom:"6px"}}, ...rows):null;
  }
  function renderAchievement(fieldKey,icon,label,weight,isApproved){
    const pending=KPI_PROPOSALS.filter(p=>p.resident_id===res.id&&p.field_key===fieldKey&&p.quarter==null&&p.status==="pending");

    const approvedProps=KPI_PROPOSALS.filter(p=>p.resident_id===res.id&&p.field_key===fieldKey&&p.quarter==null&&p.status==="approved");

    return el("div",{st:{background:bg,borderRadius:"12px",padding:"14px 16px",border:"1px solid "+border}},
      el("div",{cls:"flex-gap",st:{marginBottom:"8px"}},

        el("div",{st:{flex:"1"}},

      ),

        isPD()?el("button",{cls:"sbtn ghost",st:{fontSize:".7rem",padding:"2px 8px",color:"#dc2626",borderColor:"#fca5a5",marginTop:"4px"},onClick:()=>revokeKpiApproval(res.id,fieldKey,ap.id)},"Undo"):null
      )),
      // PD review panel for pending proposals

        ...pending.map(p=>el("div",{st:{background:"#fff",border:"1px solid #fde68a",borderRadius:"8px",padding:"8px 10px",marginBottom:"4px"}},

            el("button",{cls:"sbtn ghost",st:{fontSize:".74rem",padding:"3px 10px",color:"#dc2626",borderColor:"#dc2626"},onClick:()=>reviewProposal(p.id,false)},"Reject")
          )
        ))
      ):null,
      // Submit button — always shown so residents can add multiple achievements
      (canEdit_||canSetMilestone||isMyRes)?

          _kpiPropLive={};set({kpiPropModal:{resId:res.id,fieldKey},kpiPropUploading:false});
        }},(isApproved||approvedProps.length)?(submitMoreLabels[fieldKey]||"Submit Another"):(submitLabels[fieldKey]||"+ Submit Achievement")):null,
      // Show rejection note only if nothing approved or pending
      !isApproved&&!pending.length&&rejected.length?
        el("div",{st:{fontSize:".74rem",color:"#dc2626",marginTop:"4px"}},"Previous submission was rejected"):null
    );
  }

      text?el("div",{st:{marginTop:"14px"}},
        el("div",{st:{fontSize:".68rem",fontWeight:"700",textTransform:"uppercase",letterSpacing:".06em",color:"rgba(31,26,18,.35)",marginBottom:"8px"}},"Achievement Status"),

        ):pendingProp.length?el("div",null,

            el("div",{st:{fontSize:".74rem",fontWeight:"600",marginBottom:"6px",color:"rgba(31,26,18,.55)"}}, "Claimed by "+(p.proposed_by_role==="resident"?"the resident":p.proposed_by_role==="consultant"?"the mentor":"Chief Resident")+" · "+new Date(p.proposed_at).toLocaleDateString("en-GB",{day:"numeric",month:"short"})
            ),

function renderLeaveRequests(){
  // Collect all requests across residents
  const pending=[];const rejected=[];const rotaPending=[];
  RESIDENTS.forEach(r=>{
    (LEAVE_DATA[r.id]?.requests||[]).forEach(req=>{
      if(req.status==="pending")pending.push({...req,res:r});
      else rejected.push({...req,res:r});
    });
    // Rota-detected leaves not yet formally approved
    const ld=LEAVE_DATA[r.id]||{rota:[],manual:[]};
    const approvedBlocks=new Set((ld.manual||[]).map(m=>{const mt=m.comment?.match(/Rota leave B(\d+)/);return mt?parseInt(mt[1]):null;}).filter(Boolean));
    (ld.rota||[]).filter(l=>!approvedBlocks.has(l.period)).forEach(l=>rotaPending.push({...l,res:r}));
  });
  pending.sort((a,b)=>a.createdAt?.localeCompare(b.createdAt||"")||0);
  rotaPending.sort((a,b)=>a.period-b.period);
  const isEdu=c=>c?.startsWith("[EDU]");
  const cleanComment=c=>c?.replace("[EDU] ","")?.split("\n")[0]||"";

  function reqRow(req,showActions){
    const edu=isEdu(req.comment);
    const rejected=req.status==="rejected";
    const rejNote=req.comment?.split("\n").find(l=>l.startsWith("[Rejection note:"))?.replace("[Rejection note: ","").replace("]","");
    return el("div",{st:{padding:"12px",border:"1px solid "+(rejected?"#fca5a5":edu?"#ddd6fe":"#bfdbfe"),borderRadius:"10px",marginBottom:"8px",background:rejected?"#fff5f5":edu?"#faf5ff":"#eff6ff"}},
      el("div",{cls:"flex-gap",st:{flexWrap:"wrap",gap:"8px",marginBottom:"6px"}},
        el("div",{cls:"flex-gap",st:{gap:"8px",alignItems:"center",flex:"1"}},
          avEl(req.res),
          el("div",null,
            el("div",{st:{fontWeight:"700",fontSize:".88rem"}},req.res.name),
            el("div",{cls:"sub"},req.res.level+" · Mentor: "+mentorName(req.res.id))
          )
        ),
        el("span",{cls:"bdg",st:{background:edu?"#ede9fe":"rgba(38,82,58,.12)",color:edu?"#5b21b6":"#26523A"}},edu?" Educational":" Annual"),
        el("span",{cls:"bdg",st:{background:"#FEFBF3",color:"#475569"}},req.days+"d")
      ),
      el("div",{st:{fontSize:".82rem",color:"#1F1A12",marginBottom:"4px"}}, " "+fmtDate(req.from)+" → "+fmtDate(req.to)
      ),
      cleanComment(req.comment)?el("div",{st:{fontSize:".82rem",color:"rgba(31,26,18,.42)",marginBottom:"4px"}}," "+cleanComment(req.comment)):null,
      rejected&&rejNote?el("div",{st:{fontSize:".78rem",color:"#b91c1c",marginTop:"4px"}}," Rejected: "+rejNote):null,
      showActions?el("div",{cls:"flex-gap",st:{marginTop:"8px",gap:"8px"}},
        el("button",{cls:"sbtn success",st:{fontSize:".78rem"},onClick:async()=>{
          showConfirm("Approve this leave request for "+req.res.name+"?",async()=>{
            await approveLeaveRequest(req.id,req.res.id,req.from,req.to,req.days,req.comment);
          },"Approve","success");
        }},"Approve"),
        el("button",{cls:"sbtn danger",st:{fontSize:".78rem"},onClick:async()=>{
          const note=prompt("Rejection note (optional):");
          if(note===null)return;
          await rejectLeaveRequest(req.id,req.comment,note);
        }},"Reject")
      ):null
    );
  }

  // Rota leave row renderer
  function rotaRow(l){
    const bs=blockStartDate(l.period,CURRENT_ACADEMIC_YEAR);
    const days=l.partial?l.weeks*7:28;
    let fromDate,toDate;
    if(bs){
      if(!l.partial){fromDate=bs;toDate=new Date(bs.getTime()+27*86400000);}
      else if(l.position==="start"){fromDate=bs;toDate=new Date(bs.getTime()+(days-1)*86400000);}
      else{toDate=new Date(bs.getTime()+27*86400000);fromDate=new Date(toDate.getTime()-(days-1)*86400000);}
    }
    const fmt=d=>d?fmtDate(d.toISOString().split("T")[0]):"—";
    return el("div",{st:{padding:"12px",border:"1px solid rgba(164,122,40,.25)",borderRadius:"10px",marginBottom:"8px",background:"#fdf8ee"}},
      el("div",{cls:"flex-gap",st:{marginBottom:"6px",flexWrap:"wrap",gap:"8px"}},
        el("div",{cls:"flex-gap",st:{gap:"8px",alignItems:"center",flex:"1"}},
          avEl(l.res),
          el("div",null,
            el("div",{st:{fontWeight:"700",fontSize:".88rem"}},l.res.name),
            el("div",{cls:"sub"},l.res.level)
          )
        ),
        el("span",{cls:"bdg",st:{background:"rgba(164,122,40,.12)",color:"#7a5a10"}},"Rota Block "+l.period),
        el("span",{cls:"bdg",st:{background:"#FEFBF3",color:"#475569"}},days+"d"+(l.partial?" (partial)":""))
      ),
      bs?el("div",{st:{fontSize:".82rem",color:"#1F1A12",marginBottom:"8px"}}," "+fmt(fromDate)+" → "+fmt(toDate)):
        el("div",{cls:"sh",st:{marginBottom:"8px"}},"Dates unavailable for this block"),
      el("button",{cls:"sbtn success",st:{fontSize:".78rem"},onClick:async()=>{
        showConfirm("Approve rota leave Block "+l.period+" for "+l.res.name+"?",async()=>{
          if(!bs){showToast("Cannot compute dates for this block.","error");return;}
          const from=fromDate.toISOString().split("T")[0];
          const to=toDate.toISOString().split("T")[0];
          await addManualLeave(l.res.id,from,to,days,"Rota leave B"+l.period);
        },"Approve","success");
      }},"Approve")
    );
  }

  return el("div",null,
    rotaPending.length>0?el("div",{cls:"card",st:{marginBottom:"16px"}},
      el("div",{cls:"flex-gap",st:{marginBottom:"12px"}},
        el("span",{cls:"card-title",st:{margin:"0"}},"Rota-Detected Leave"),
        el("span",{cls:"bdg",st:{background:"rgba(164,122,40,.15)",color:"#7a5a10"}},rotaPending.length+" pending approval")
      ),
      el("div",{cls:"sh",st:{marginBottom:"12px",fontSize:".78rem"}},"Leave blocks detected from the master rota. Approve to formally record them."),
      el("div",null,...rotaPending.map(rotaRow))
    ):null,
    el("div",{cls:"card"},
      el("div",{cls:"flex-gap",st:{marginBottom:"12px"}},
        el("span",{cls:"card-title",st:{margin:"0"}},"Pending Leave Requests"),
        el("span",{cls:"bdg",st:{background:"#fef9c3",color:"#854d0e"}},pending.length+" pending")
      ),
      pending.length===0?el("p",{cls:"sh"},"No pending requests — all clear "):
      el("div",null,...pending.map(req=>reqRow(req,true)))
    ),
    rejected.length>0?el("div",{cls:"card"},
      el("div",{cls:"card-title"},"Rejected Requests"),
      el("div",{cls:"sh",st:{marginBottom:"10px",fontSize:".78rem"}},"Residents can see these in their Leave view."),
      ...rejected.map(req=>reqRow(req,false))
    ):null
  );
}
function renderLeaveDetail(rid,onBack){
  const res=resById(rid);
  if(!res)return el("div",null,"Not found");
  const ld=LEAVE_DATA[rid]||{rota:[],manual:[],absences:[],requests:[]};
  if(!LEAVE_DATA[rid])LEAVE_DATA[rid]={rota:[],manual:[],absences:[],requests:[]};
  // Quotas
  const ANNUAL_QUOTA=28;
  const EDU_QUOTA=7;
  // Split manual leaves into annual vs educational ([EDU] prefix in comment)
  const annualLeaves=ld.manual.filter(x=>x.approved&&!x.comment?.startsWith("[EDU]"));
  const eduLeaves=ld.manual.filter(x=>x.approved&&x.comment?.startsWith("[EDU]"));
  const annualApproved=annualLeaves.reduce((a,x)=>a+(x.days||0),0);
  const eduApproved=eduLeaves.reduce((a,x)=>a+(x.days||0),0);
  const absenceDays=ld.absences.reduce((a,x)=>a+(x.days||0),0);
  // Rota days that haven't been formally approved yet
  const approvedBlocks=new Set(ld.manual.map(m=>{const mt=m.comment?.match(/Rota leave B(\d+)/);return mt?parseInt(mt[1]):null;}).filter(Boolean));
  const rotaDays=ld.rota.reduce((a,l)=>a+(approvedBlocks.has(l.period)?0:(l.partial?l.weeks*7:28)),0);
  const totalUsedAnnual=annualApproved+rotaDays;
  const annualRemaining=ANNUAL_QUOTA-totalUsedAnnual;
  const eduRemaining=EDU_QUOTA-eduApproved;
  // Helper: approve a rota leave entry
  async function approveRotaLeave(l){
    const blockStart=blockStartDate(l.period,CURRENT_ACADEMIC_YEAR);
    if(!blockStart){showToast("Cannot compute dates for this block.");return;}
    const days=l.partial?l.weeks*7:28;
    let fromDate,toDate;
    if(!l.partial){
      fromDate=blockStart;
      toDate=new Date(blockStart.getTime()+27*86400000);
    }else if(l.position==="start"){
      fromDate=blockStart;
      toDate=new Date(blockStart.getTime()+(days-1)*86400000);
    }else{
      toDate=new Date(blockStart.getTime()+27*86400000);
      fromDate=new Date(toDate.getTime()-(days-1)*86400000);
    }
    const from=fromDate.toISOString().split("T")[0];
    const to=toDate.toISOString().split("T")[0];
    await addManualLeave(rid,from,to,days,"Rota leave B"+l.period);
  }
  // Prev / Next navigation across visible residents
  const vr_=visRes();
  const curIdx=vr_.findIndex(r=>r.id===rid);
  const prevRes=curIdx>0?vr_[curIdx-1]:null;
  const nextRes=curIdx<vr_.length-1?vr_[curIdx+1]:null;
  const navBtn=(label,r)=>el("button",{st:{background:"none",border:"1.5px solid rgba(31,26,18,.18)",borderRadius:"999px",padding:"6px 16px",fontSize:".8rem",fontWeight:"600",color:"rgba(31,26,18,.6)",cursor:"pointer",transition:"all .15s"},
    onClick:()=>set({leaveSelRes:r.id})},label);
  return el("div",null,
    el("div",{st:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px",flexWrap:"wrap"}},
      onBack?el("button",{st:{background:"none",border:"none",color:"#c96a4a",cursor:"pointer",fontSize:".82rem",fontWeight:"600",padding:"0",display:"flex",alignItems:"center",gap:"4px"},onClick:onBack},"← Back to List"):null,
      el("div",{st:{flex:"1"}}),
      prevRes?navBtn("← "+dname(prevRes.name),prevRes):el("span",{st:{width:"1px"}}),
      el("span",{st:{fontSize:".75rem",color:"rgba(31,26,18,.35)",padding:"0 4px"}},(curIdx+1)+" / "+vr_.length),
      nextRes?navBtn(dname(nextRes.name)+" →",nextRes):el("span",{st:{width:"1px"}})
    ),
    el("div",{cls:"card"},
      el("div",{cls:"flex-gap",st:{marginBottom:"14px"}},
        avEl(res),
        el("div",null,el("div",{cls:"name"},res.name),el("div",{cls:"sub"},res.level+" · Mentor: "+mentorName(res.id))),
        levelBadge(res.level)
      ),
      el("div",{cls:"grid-4",st:{gap:"10px"}},
        el("div",{cls:"statbox"},
          el("div",{cls:"statval",st:{color:annualRemaining<0?"#dc2626":annualRemaining<7?"#A47A28":"#059669"}},annualRemaining),
          el("div",{cls:"statlbl"},"Annual Remaining"),
          el("div",{st:{fontSize:".65rem",color:"#94a3b8",marginTop:"2px"}},totalUsedAnnual+"/"+ANNUAL_QUOTA+" used")
        ),
        el("div",{cls:"statbox"},
          el("div",{cls:"statval",st:{color:eduRemaining<0?"#dc2626":"#7c3aed"}},eduRemaining),
          el("div",{cls:"statlbl"},"Edu Leave Remaining"),
          el("div",{st:{fontSize:".65rem",color:"#94a3b8",marginTop:"2px"}},eduApproved+"/"+EDU_QUOTA+" used")
        ),
        el("div",{cls:"statbox"},
          el("div",{cls:"statval",st:{color:absenceDays>0?"#dc2626":"#26523A"}},absenceDays),
          el("div",{cls:"statlbl"},"Unapproved Absences")
        ),
        el("div",{cls:"statbox"},
          el("div",{cls:"statval",st:{color:"#0ea5e9"}},ld.rota.length),
          el("div",{cls:"statlbl"},"Rota Leave Blocks")
        )
      )
    ),
    el("div",{cls:"card"},
      el("div",{cls:"card-title"},"Rota Leaves (Auto-detected)"),
      el("div",{cls:"sh",st:{marginBottom:"10px",fontSize:".78rem"}},"Leaves detected from the uploaded rota. Click Approve to record them officially."),

function renderCounselForm(rid,existing){
  const res=resById(rid);
  const opts=existing?[]:counselRecipientOptions(res);
  return el("div",{cls:"inline-form",st:{marginBottom:"14px"}},
    el("div",{cls:"grid-2",st:{marginBottom:"10px"}},
      el("div",null,el("label",null,"Date"),el("input",{type:"date",id:"cs_date",value:existing?existing.date:(new Date().toISOString().split("T")[0])})),
      el("div",null,el("label",null,"Reason"),el("input",{id:"cs_reason",placeholder:"Reason for counseling",value:existing?existing.reason:""}))
    ),
    el("div",{st:{marginBottom:"10px"}},el("label",null,"Details"),el("textarea",{id:"cs_details",rows:"3",placeholder:"Detailed notes..."},existing?existing.details:"")),
    !existing?el("div",{st:{marginBottom:"10px"}},
      el("label",null,"Countersign Recipient"),
      opts.length===0?el("p",{cls:"sh"},"This resident and their mentor don't have a login yet — create one first (Admin Panel) so they can countersign this record."):
      el("select",{id:"cs_recipient"},
        ...opts.map(o=>el("option",{value:o.id},o.label))
      )
    ):null,
    el("p",{id:"cs_err",cls:"err"}),
    el("div",{cls:"flex-gap"},
      el("button",{cls:"sbtn success",onClick:async()=>{
        const date=document.getElementById("cs_date").value;
        const reason=document.getElementById("cs_reason").value.trim();
        const details=document.getElementById("cs_details").value.trim();
        const errEl=document.getElementById("cs_err");
        if(!date||!reason){errEl.textContent="Date and reason are required.";return;}
        if(existing){
          const{error}=await sb.from("counseling").update({date,reason,details}).eq("id",existing.id);
          if(error){errEl.textContent=error.message;return;}
        }else{
          const recipientEl=document.getElementById("cs_recipient");
          const recipient=recipientEl?recipientEl.value:null;
          if(!recipient){errEl.textContent="No available recipient to countersign this record.";return;}
          const{error}=await sb.from("counseling").insert({
            resident_id:rid,date,reason,details,
            issued_by:STATE.user.profileId,
            recipient_profile_id:recipient
          });
          if(error){errEl.textContent=error.message;return;}
        }
        set({counselShowForm:false,counselEditId:null});
        loadCounsel(rid);
      }},"Save"),
      el("button",{cls:"sbtn ghost",onClick:()=>set({counselShowForm:false,counselEditId:null})},"Cancel")
    )
  );
}

// ─── PD OVERVIEW DASHBOARD ───────────────────────────────────────────────────
function renderPDOverview(){
  const kpiColor=v=>v>=80?"#26523A":v>=60?"#A47A28":"#dc2626";
  const filterLevel=STATE.ovLevel||"all";
  const sortBy=STATE.ovSort||"name";

  // ── Lazy-load all counseling in one shot if not yet done ──────────────────
  const anyUnloaded=RESIDENTS.some(r=>COUNSEL_CACHE[r.id]===undefined);
  if(anyUnloaded){
    RESIDENTS.forEach(r=>{if(COUNSEL_CACHE[r.id]===undefined)COUNSEL_CACHE[r.id]=null;});
    sb.from("counseling").select("*").order("date",{ascending:false}).then(({data})=>{
      const fresh={};
      (data||[]).forEach(rec=>{
        if(!fresh[rec.resident_id])fresh[rec.resident_id]=[];
        fresh[rec.resident_id].push(rec);
      });
      RESIDENTS.forEach(r=>{COUNSEL_CACHE[r.id]=fresh[r.id]||[];});
      set({});
    });
  }

  // ── Build rows ────────────────────────────────────────────────────────────
  let rows=RESIDENTS.map(r=>{
    const k=calcKPI(r.id);
    const cRecs=COUNSEL_CACHE[r.id];
    const counselCount=Array.isArray(cRecs)?cRecs.length:null;
    const atRisk=k.overall<60||k.mmPct<60||k.tPct<60;
    return{...r,k,counselCount,atRisk};
  });
  if(filterLevel!=="all")rows=rows.filter(r=>r.level===filterLevel);
  const sortRows={name:(a,b)=>a.name.localeCompare(b.name),level:(a,b)=>a.level.localeCompare(b.level)||a.name.localeCompare(b.name),kpi:(a,b)=>b.k.overall-a.k.overall,mm:(a,b)=>b.k.mmPct-a.k.mmPct,teach:(a,b)=>b.k.tPct-a.k.tPct,quiz:(a,b)=>b.k.qAvg-a.k.qAvg};
  rows.sort(sortRows[sortBy]||sortRows.name);

  // ── Summary stats ─────────────────────────────────────────────────────────
  const total=rows.length;
  const avgKPI=total?Math.round(rows.reduce((s,r)=>s+r.k.overall,0)/total):0;
  const atRiskCount=rows.filter(r=>r.atRisk).length;
  const withCounsel=rows.filter(r=>r.counselCount>0).length;

  function statCard(icon,label,val,color,sub){
    return el("div",{st:{flex:"1",minWidth:"130px",background:color+"0d",border:"1px solid "+color+"33",borderRadius:"14px",padding:"16px 14px",textAlign:"center"}},
      el("div",{st:{fontSize:"1.5rem",marginBottom:"4px"}},icon),
      el("div",{st:{fontSize:"1.55rem",fontWeight:"900",color,lineHeight:"1.1"}},val),
      el("div",{st:{fontSize:".8rem",fontWeight:"700",color:"#1F1A12",marginTop:"4px"}},label),
      sub?el("div",{cls:"sh",st:{fontSize:".72rem",marginTop:"2px"}},sub):null
    );
  }

  const summary=el("div",{st:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginBottom:"24px"}},
    statCard("","Total Residents",total,"#c96a4a"),
    statCard("","Average KPI",avgKPI+"%",kpiColor(avgKPI)),
    statCard("","At Risk",atRiskCount,"#dc2626","KPI or attendance < 60%"),
    statCard("","With Counseling",withCounsel,"#A47A28","Active records")
  );

  // ── Filters ───────────────────────────────────────────────────────────────
  const filters=el("div",{st:{display:"flex",flexWrap:"wrap",gap:"8px",alignItems:"center",padding:"0 0 16px"}},
    el("span",{cls:"sh",st:{fontWeight:"700",marginRight:"2px"}},"Level:"),
    ...["all","R1","R2","R3","R4"].map(l=>
      el("span",{cls:"pill"+(filterLevel===l?" on":""),onClick:()=>set({ovLevel:l})},l==="all"?"All":l)
    ),
    el("span",{st:{flex:"1"}}),
    el("span",{cls:"sh",st:{fontWeight:"700",marginRight:"2px"}},"Sort:"),
    ...[["name","Name"],["level","Level"],["kpi","KPI ↓"],["mm","MM"],["teach","Teach"],["quiz","Quiz"]].map(([k,lbl])=>
      el("span",{cls:"pill"+(sortBy===k?" on":""),onClick:()=>set({ovSort:k})},lbl)
    )
  );

  // ── Level badge colors ────────────────────────────────────────────────────
  const lvlStyle={R1:{bg:"rgba(38,82,58,.12)",fg:"#26523A"},R2:{bg:"rgba(127,184,156,.15)",fg:"#26523A"},R3:{bg:"rgba(164,122,40,.12)",fg:"#6a4c10"},R4:{bg:"rgba(201,106,74,.12)",fg:"#A47A28"}};

  // ── Table ─────────────────────────────────────────────────────────────────
  function colH(label,key){
    return el("th",{
      st:{padding:"10px 12px",fontWeight:"700",fontSize:".74rem",textTransform:"uppercase",letterSpacing:".04em",color:"rgba(31,26,18,.42)",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",background:"#F6EFE2"},
      onClick:()=>set({ovSort:key})
    },label+(sortBy===key?" ↓":""));
  }
  function pctCell(val){
    const col=kpiColor(val);
    return el("td",{st:{padding:"8px 10px",textAlign:"center"}},
      el("div",{st:{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}},
        el("span",{st:{fontWeight:"700",fontSize:".86rem",color:col}},val+"%"),
        el("div",{st:{width:"48px",height:"4px",background:"rgba(31,26,18,.1)",borderRadius:"2px"}},
          el("div",{st:{width:Math.min(val,100)+"%",height:"100%",background:col,borderRadius:"2px"}})
        )
      )
    );
  }

  const thead=el("thead",null,
    el("tr",{st:{borderBottom:"2px solid #e2e8f0"}},
      colH("Resident","name"),colH("Level","level"),colH("KPI","kpi"),
      colH("MM Att.","mm"),colH("Teaching","teach"),colH("Quiz","quiz"),
      el("th",{st:{padding:"10px 12px",fontWeight:"700",fontSize:".74rem",textTransform:"uppercase",color:"rgba(31,26,18,.42)",background:"#F6EFE2"}},"Counsel"),
      el("th",{st:{padding:"10px 12px",background:"#F6EFE2"}})
    )
  );

  const tbody=el("tbody",null,...rows.map((row,i)=>{
    const ls=lvlStyle[row.level]||{bg:"#FEFBF3",fg:"#1F1A12"};
    const cVal=row.counselCount===null?"…":row.counselCount===0?"—":String(row.counselCount);
    const cColor=row.counselCount>0?"#dc2626":"rgba(31,26,18,.42)";
    return el("tr",{
      st:{borderBottom:"1px solid #f1f5f9",cursor:"pointer",transition:"background .12s"},
      onMouseover:e=>e.currentTarget.style.background="#F6EFE2",
      onMouseout:e=>e.currentTarget.style.background="",
      onClick:()=>set({mod:"admin",adminProfile:row.id,adminResTab:"kpi"})
    },
      el("td",{st:{padding:"8px 12px"}},
        el("div",{st:{display:"flex",alignItems:"center",gap:"8px"}},
          el("div",{cls:"av",st:{width:"32px",height:"32px",fontSize:".7rem",flexShrink:"0"}},row.ph),
          el("div",null,
            el("div",{st:{fontWeight:"700",fontSize:".86rem",color:"#1F1A12"}},
              row.name,
              row.atRisk?el("span",{st:{marginLeft:"6px",fontSize:".7rem",color:"#dc2626",fontWeight:"800"}},"At Risk"):null
            ),
            el("div",{cls:"sh",st:{fontSize:".72rem"}},"Mentor: "+mentorName(row.id))
          )
        )
      ),
      el("td",{st:{padding:"8px 10px",textAlign:"center"}},
        el("span",{cls:"bdg",st:{background:ls.bg,color:ls.fg,fontSize:".75rem"}},row.level)
      ),
      el("td",{st:{padding:"8px 10px",textAlign:"center"}},
        el("div",{st:{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}},
          el("span",{st:{fontWeight:"900",fontSize:".95rem",color:kpiColor(row.k.overall)}},row.k.overall+"%"),
          el("div",{st:{width:"54px",height:"6px",background:"rgba(31,26,18,.1)",borderRadius:"3px"}},
            el("div",{st:{width:Math.min(row.k.overall,100)+"%",height:"100%",background:kpiColor(row.k.overall),borderRadius:"3px"}})
          )
        )
      ),
      pctCell(row.k.mmPct),
      pctCell(row.k.tPct),
      pctCell(row.k.qAvg),
      el("td",{st:{padding:"8px 10px",textAlign:"center",fontWeight:"700",color:cColor,fontSize:".88rem"}},cVal),
      el("td",{st:{padding:"8px 10px",textAlign:"right"}},
        el("span",{cls:"sh",st:{fontSize:".76rem"}},"View →")
      )
    );
  }));

  const table=el("table",{st:{width:"100%",borderCollapse:"collapse",fontSize:".84rem"}},thead,tbody);

  // ── At-risk highlight box ─────────────────────────────────────────────────
  const atRiskBox=atRiskCount>0?el("div",{cls:"alert-red",st:{marginBottom:"16px"}},
    el("div",{st:{fontWeight:"700",marginBottom:"4px"}},""+atRiskCount+" resident"+(atRiskCount>1?"s":"")+" at risk"),
    ...rows.filter(r=>r.atRisk).map(r=>{
      const flags=[];
      if(r.k.overall<60)flags.push("KPI "+r.k.overall+"%");
      if(r.k.mmPct<60)flags.push("MM "+r.k.mmPct+"%");
      if(r.k.tPct<60)flags.push("Teaching "+r.k.tPct+"%");
      return el("div",{st:{fontSize:".82rem",marginTop:"3px",cursor:"pointer"},onClick:()=>set({mod:"admin",adminProfile:r.id,adminResTab:"kpi"})}, "– "+r.name+" ("+r.level+") — "+flags.join(", ")+" → Click to view" );
    })
  ):null;

  const counselFlagged=rows.filter(r=>Array.isArray(COUNSEL_CACHE[r.id])&&COUNSEL_CACHE[r.id].length>=2);
  const counselBox=counselFlagged.length>0?el("div",{st:{marginBottom:"16px",background:"#fef9ec",border:"1px solid #f0d98a",borderRadius:"12px",padding:"14px 18px"}},
    el("div",{st:{fontWeight:"700",fontSize:".84rem",color:"#92680a",marginBottom:"6px"}},"Counseling flags — "+counselFlagged.length+" resident"+(counselFlagged.length>1?"s":"")+" with 2 or more records"),
    el("div",{st:{display:"flex",flexWrap:"wrap",gap:"8px"}},
      ...counselFlagged.map(r=>el("div",{st:{fontSize:".8rem",cursor:"pointer",padding:"4px 12px",background:"#fff",border:"1px solid #f0d98a",borderRadius:"999px",color:"#92680a",fontWeight:"600"},onClick:()=>set({mod:"counseling",counselDrawerRes:r.id})},
        r.name+" ("+r.level+") — "+COUNSEL_CACHE[r.id].length+" records"
      ))
    )
  ):null;

  return el("div",{cls:"content"},
    el("div",{cls:"flex-gap",st:{marginBottom:"16px",flexWrap:"wrap",alignItems:"center"}},
      el("button",{cls:"back-btn",onClick:()=>set({mod:null})},"Back"),
      el("h2",{st:{fontWeight:"800",color:"#1F1A12"}},"Overview Dashboard")
    ),
    summary,
    atRiskBox,

    el("div",{cls:"card",st:{padding:"0",overflow:"hidden"}},
